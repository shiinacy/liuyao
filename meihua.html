<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a16">
<title>梅花易数</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0a16;--card:#111125;--card2:#0e0e1e;--gold:#ffd700;--gold2:#b8960f;--dim:#555577;--dim2:#333355;--yang:#44aaff;--yin:#6688ff;--dong:#ffdd00;--green:#44ff44;--red:#ff4444;--text:#ccccdd;--text2:#9999bb;--sidebar-w:min(320px,85vw)}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:520px;margin:0 auto;overflow-x:hidden;position:relative;padding-left:env(safe-area-inset-left,0px);padding-right:env(safe-area-inset-right,0px)}
.top-bar{position:relative;padding:28px 16px 12px;background:linear-gradient(180deg,#151530,var(--bg))}
.back-btn{position:absolute;left:12px;top:28px;background:none;border:none;color:var(--gold);font-size:14px;cursor:pointer;padding:4px 8px;opacity:.8}
.back-btn:active{background:#1a1a30}
.settings-btn{position:absolute;right:12px;top:28px;background:none;border:none;color:var(--dim);font-size:20px;cursor:pointer;padding:4px 8px}
.settings-btn:active{background:#1a1a30}
.hist-btn{position:absolute;right:48px;top:28px;background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer;padding:4px 8px}
.hist-btn:active{background:#1a1a30}
.header{text-align:center;padding:0}
.header h1{font-size:22px;color:var(--gold);text-shadow:0 0 20px rgba(255,215,0,.3);letter-spacing:4px}
.header p{font-size:9px;color:var(--dim);margin-top:2px;letter-spacing:1px;white-space:nowrap}
.card{background:var(--card);border-radius:12px;padding:14px;margin:8px 12px;border:1px solid #1a1a35}
.tabs{display:flex;gap:4px;margin:8px 12px;background:var(--card2);border-radius:10px;overflow:hidden;padding:4px}
.tab{flex:1;padding:8px 4px;text-align:center;font-size:12px;font-weight:600;cursor:pointer;color:var(--dim);border:none;background:none;transition:all .2s;white-space:nowrap}
.tab.active{background:linear-gradient(135deg,#2a2a55,#1e1e40);color:var(--gold)}
.tab:hover{color:var(--text)}
.tab:active{opacity:.8}
.tab-panel{display:none}.tab-panel.active{display:block}
.input-group{margin:6px 0}
.input-group label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px}
.input-group input{width:100%;background:#15152a;border:1px solid #2a2a44;border-radius:8px;padding:10px 12px;color:#fff;font-size:14px;outline:none}
.input-group input:focus{border-color:var(--gold)}
.input-group input::placeholder{color:#444466;font-size:13px}
.input-row-flex{display:flex;gap:8px}
.input-row-flex .input-group{flex:1}
.dir-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:4px 0}
.dir-btn{padding:12px 4px;border:1px solid #2a2a44;border-radius:10px;background:var(--card2);color:var(--text);font-size:14px;cursor:pointer;text-align:center;transition:all .15s}
.dir-btn:hover{border-color:var(--gold2);transform:translateY(-1px)}
.dir-btn:active{transform:scale(.96)}
.dir-btn.selected{border-color:var(--gold);color:var(--gold);background:#1a1a35}
.btn-divine{display:block;width:calc(100% - 24px);margin:10px 12px;padding:13px;border:none;border-radius:10px;background:linear-gradient(135deg,#cc3333,#aa2222);color:#fff;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:2px;transition:all .15s}
.btn-divine:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(204,51,51,.3)}
.btn-divine:active{transform:scale(.97)}
.btn-divine:disabled{background:#444455;color:#666;cursor:default}
.time-info{font-size:11px;color:var(--dim);text-align:center;margin:4px 12px}
#resultsArea{display:none}
#resultsArea.show{display:block}
.result-section{background:var(--card);border-radius:12px;padding:14px;margin:8px 12px;border:1px solid #1a1a35}
.result-section-title{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:8px;text-align:center;letter-spacing:2px}
.gua-display{display:flex;align-items:center;justify-content:center;gap:10px;margin:6px 0}
.trigram-box{text-align:center}
.trigram-lines{font-family:monospace;font-size:18px;line-height:1.2;color:var(--yang)}
.trigram-name{font-size:11px;color:var(--text2);margin-top:2px}
.gua-arrow{font-size:18px;color:var(--gold)}
.gua-title{font-size:18px;font-weight:700;color:var(--gold);text-align:center;margin:6px 0}
.gua-fortune{font-size:14px;font-weight:600;text-align:center;margin:2px 0}
.detail-row{display:flex;padding:5px 0;border-bottom:1px solid #1a1a2a;font-size:12px}
.detail-label{width:65px;color:var(--dim);flex-shrink:0}
.detail-value{flex:1;color:var(--text)}
.tiyong-rel{font-size:15px;font-weight:700;text-align:center;padding:8px;border-radius:8px;margin:6px 0}
.tiyong-rel.ji{color:var(--green);background:rgba(68,255,68,.08)}
.tiyong-rel.xiong{color:var(--red);background:rgba(255,68,68,.08)}
.tiyong-rel.ping{color:var(--dong);background:rgba(255,221,0,.08)}
.liangxiang-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
.liangxiang-card{background:var(--card2);border-radius:8px;padding:10px}
.lx-title{font-size:12px;font-weight:700;color:var(--gold);margin-bottom:4px}
.lx-cat{font-size:11px;color:var(--dim);margin-bottom:2px}
.lx-items{font-size:11px;color:var(--text);line-height:1.6}
.score-card{text-align:center;padding:12px}
.score-num{font-size:36px;font-weight:900}
.score-label{font-size:12px;color:var(--text2);margin-top:2px}
.score-bar{width:80%;height:6px;border-radius:3px;background:#222;margin:8px auto;overflow:hidden}
.score-fill{height:100%;border-radius:3px;transition:width .6s ease}
.btn-row{display:flex;gap:10px;padding:0 12px;margin:10px 0 20px;}.btn-ai{flex:1;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,#2255aa,#1a4488);color:#fff;font-size:14px;font-weight:600;cursor:pointer;letter-spacing:1px}
.btn-ai:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(34,85,170,.3)}
.btn-ai:active{transform:scale(.97)}
.copy-hint{font-size:11px;color:var(--green);text-align:center;min-height:16px;margin-bottom:10px}
.sidebar-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:100;opacity:0;pointer-events:none;transition:opacity .4s}
.sidebar-overlay.show{opacity:1;pointer-events:auto}
.sidebar{position:fixed;top:0;right:0;width:var(--sidebar-w);height:100%;background:linear-gradient(180deg,rgba(17,17,40,.98),rgba(10,10,22,.99));z-index:101;transform:translateX(100%);transition:transform .4s cubic-bezier(.22,1,.36,1);overflow-y:auto;padding:20px 16px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-left:1px solid rgba(255,215,0,.1);box-shadow:-4px 0 30px rgba(0,0,0,.5)}
.sidebar.show{transform:translateX(0)}
.sidebar-title{font-size:16px;font-weight:700;color:var(--gold);margin-bottom:16px;padding-bottom:12px;display:flex;justify-content:space-between;align-items:center;position:relative}
.sidebar-close{background:none;border:none;color:var(--dim);font-size:20px;cursor:pointer;padding:4px 8px}
.sidebar-section{margin-bottom:16px}
.sidebar-section h3{font-size:12px;color:var(--dim);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.sidebar-section input{width:100%;background:#15152a;border:1px solid #2a2a44;border-radius:8px;padding:9px 10px;color:#fff;font-size:13px;outline:none;margin-bottom:6px}
.sidebar-section input:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(255,215,0,.12),0 0 20px rgba(255,215,0,.06)}
.sidebar-section label{display:block;font-size:11px;color:var(--text2);margin-bottom:3px}
.sidebar-btn{width:100%;padding:10px;border:1px solid #2a2a44;border-radius:8px;background:var(--card2);color:var(--text);font-size:13px;cursor:pointer;margin-bottom:6px}
.sidebar-btn:active{background:#2a2a50}
.sidebar-btn.primary{background:linear-gradient(135deg,#2255aa,#1a4488);border-color:#3366cc;color:#fff}
.sidebar-status{font-size:11px;color:var(--dim);text-align:center;margin-top:8px;min-height:16px}
.footer{text-align:center;padding:14px;font-size:10px;color:#333355}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .35s ease}

@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.ai-cursor{display:inline-block;width:2px;height:1em;background:var(--gold);animation:aiBlink 1s infinite;vertical-align:text-bottom}
@keyframes aiBlink{0%,50%{opacity:1}51%,100%{opacity:0}}
.card,.tabs{opacity:0;transform:translateY(10px);animation:fadeUp .4s ease forwards}
.card:nth-child(1){animation-delay:.05s}
.card:nth-child(2){animation-delay:.1s}
.tabs{animation-delay:.05s}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 30% 40%,rgba(255,215,0,.03) 0%,transparent 50%),radial-gradient(circle at 70% 60%,rgba(68,170,255,.03) 0%,transparent 50%);pointer-events:none;z-index:0}
.result-section{opacity:0;transform:translateY(12px);animation:fadeUp .45s ease forwards}
.result-section:nth-child(1){animation-delay:.1s}
.result-section:nth-child(2){animation-delay:.2s}
.result-section:nth-child(3){animation-delay:.3s}
.result-section:nth-child(4){animation-delay:.4s}
.result-section:nth-child(5){animation-delay:.5s}
.result-section:nth-child(6){animation-delay:.6s}
.sidebar::before{content:"";position:absolute;top:0;left:0;width:1px;height:100%;background:linear-gradient(180deg,transparent,rgba(255,215,0,.4),rgba(68,170,255,.2),transparent);animation:sidebarGlow 3s ease-in-out infinite}
@keyframes sidebarGlow{0%,100%{opacity:.4}50%{opacity:1}}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-track{background:transparent}
.sidebar::-webkit-scrollbar-thumb{background:rgba(255,215,0,.2);border-radius:3px}
.sidebar::-webkit-scrollbar-thumb:hover{background:rgba(255,215,0,.4)}


/* ===== 炫酷特效 ===== */
/* 星空背景 */
body::after {
  content: '';
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background:
    radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,.6), transparent),
    radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,.4), transparent),
    radial-gradient(1px 1px at 50% 10%, rgba(255,215,0,.5), transparent),
    radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,.3), transparent),
    radial-gradient(1px 1px at 90% 40%, rgba(255,215,0,.4), transparent),
    radial-gradient(1px 1px at 15% 85%, rgba(68,170,255,.4), transparent),
    radial-gradient(1px 1px at 45% 45%, rgba(255,255,255,.5), transparent),
    radial-gradient(1px 1px at 65% 25%, rgba(255,215,0,.3), transparent),
    radial-gradient(1px 1px at 85% 65%, rgba(68,170,255,.3), transparent),
    radial-gradient(1px 1px at 25% 35%, rgba(255,255,255,.4), transparent),
    radial-gradient(1.5px 1.5px at 55% 75%, rgba(255,215,0,.5), transparent),
    radial-gradient(1px 1px at 5% 50%, rgba(255,255,255,.3), transparent),
    radial-gradient(1px 1px at 75% 15%, rgba(68,170,255,.4), transparent),
    radial-gradient(1px 1px at 35% 90%, rgba(255,215,0,.3), transparent),
    radial-gradient(1.5px 1.5px at 95% 5%, rgba(255,255,255,.5), transparent);
  pointer-events: none;
  z-index: 0;
  animation: starTwinkle 4s ease-in-out infinite alternate;
}
@keyframes starTwinkle {
  0% { opacity: .5; }
  50% { opacity: .9; }
  100% { opacity: .6; }
}

/* 流星效果 */
@keyframes shootingStar {
  0% { transform: translate(0, 0) rotate(-45deg); opacity: 1; }
  70% { opacity: 1; }
  100% { transform: translate(300px, 300px) rotate(-45deg); opacity: 0; }
}

/* 标题呼吸发光 */
.header h1 {
  animation: titleGlow 3s ease-in-out infinite;
}
@keyframes titleGlow {
  0%, 100% { text-shadow: 0 0 20px rgba(255,215,0,.2), 0 0 40px rgba(255,215,0,.05); }
  50% { text-shadow: 0 0 30px rgba(255,215,0,.4), 0 0 60px rgba(255,215,0,.1), 0 0 80px rgba(255,215,0,.05); }
}
/* 卡片悬浮光效 */
.card {
  position: relative;
  overflow: hidden;
  transition: transform .3s, box-shadow .3s, border-color .3s;
}
.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(0,0,0,.3), 0 0 30px rgba(255,215,0,.05);
  border-color: rgba(255,215,0,.15);
}
.card::after {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: linear-gradient(45deg, transparent 40%, rgba(255,215,0,.02) 50%, transparent 60%);
  transform: translateX(-100%);
  transition: transform .8s;
  pointer-events: none;
}
.card:hover::after {
  transform: translateX(100%);
}
/* 按钮脉冲 */
.btn-cast {
  position: relative;
  overflow: hidden;
}
.btn-cast::before {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  width: 0; height: 0;
  background: rgba(255,255,255,.15);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  transition: width .5s, height .5s;
}
.btn-cast:active::before {
  width: 300px; height: 300px;
}

#particleCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
</style>
</head>
<body>
<div class="top-bar">
  <button class="back-btn" onclick="location.href='index.html'">←</button>
  <div class="header">
    <h1>☯ 梅花易数 ☯</h1>
    <p>体用生克 · 卦象类象 · 趋吉避凶</p>
  </div>
  <button class="hist-btn" onclick="openHistory()" title="历史记录">🕘</button>
  <button class="settings-btn" onclick="toggleSidebar()">⚙</button>
</div>
<div class="tabs">
  <button class="tab active" onclick="switchTab(0)">数字起卦</button>
  <button class="tab" onclick="switchTab(1)">时间起卦</button>
  <button class="tab" onclick="switchTab(2)">方位起卦</button>
</div>
<div class="card tab-panel active" id="panel0">
  <div class="input-row-flex">
    <div class="input-group"><label>上卦数</label><input type="number" id="numUpper" min="1" placeholder="如：3"></div>
    <div class="input-group"><label>下卦数</label><input type="number" id="numLower" min="1" placeholder="如：5"></div>
  </div>
  <div class="input-group"><label>变父数（可选，默认自动计算）</label><input type="number" id="numMove" min="0" max="6" placeholder="留空则自动"></div>
</div>
<div class="card tab-panel" id="panel1">
  <div class="time-info" id="timeInfo"></div>
  <div class="input-row-flex">
    <div class="input-group"><label>年</label><input type="number" id="tYear" min="1900" max="2100"></div>
    <div class="input-group"><label>月</label><input type="number" id="tMonth" min="1" max="12"></div>
    <div class="input-group"><label>日</label><input type="number" id="tDay" min="1" max="31"></div>
  </div>
  <div class="input-group"><label>时辰（0-23）</label><input type="number" id="tHour" min="0" max="23"></div>
</div>
<div class="card tab-panel" id="panel2">
  <p style="font-size:12px;color:var(--text2);text-align:center;margin-bottom:8px">选择来人方位（后天八卦方位）</p>
  <div class="dir-grid">
    <button class="dir-btn" onclick="pickDir(this,4)" data-dir="4">巽<br><span style="font-size:10px;color:var(--dim)">东南</span></button>
    <button class="dir-btn" onclick="pickDir(this,3)" data-dir="3">离<br><span style="font-size:10px;color:var(--dim)">南</span></button>
    <button class="dir-btn" onclick="pickDir(this,2)" data-dir="2">坤<br><span style="font-size:10px;color:var(--dim)">西南</span></button>
    <button class="dir-btn" onclick="pickDir(this,0)" data-dir="0">兑<br><span style="font-size:10px;color:var(--dim)">西</span></button>
    <button class="dir-btn" onclick="pickDir(this,-1)" data-dir="-1" style="border-color:var(--gold);color:var(--gold);background:rgba(255,215,0,.05)">☯<br><span style="font-size:10px">中宫</span></button>
    <button class="dir-btn" onclick="pickDir(this,1)" data-dir="1">震<br><span style="font-size:10px;color:var(--dim)">东</span></button>
    <button class="dir-btn" onclick="pickDir(this,6)" data-dir="6">乾<br><span style="font-size:10px;color:var(--dim)">西北</span></button>
    <button class="dir-btn" onclick="pickDir(this,5)" data-dir="5">坎<br><span style="font-size:10px;color:var(--dim)">北</span></button>
    <button class="dir-btn" onclick="pickDir(this,7)" data-dir="7">艮<br><span style="font-size:10px;color:var(--dim)">东北</span></button>
  </div>
</div>
<button class="btn-divine" id="btnDivine" onclick="divine()">☯ 起 卦</button>
<div id="resultsArea"></div>
<div class="footer">梅花易数 · 传统术数智慧</div>
<!-- History panel -->
<div class="sidebar-overlay" id="historyOverlay" onclick="closeHistory()"></div>
<div class="sidebar" id="historyPanel">
  <div class="sidebar-title">🕘 历史记录 <button class="sidebar-close" onclick="closeHistory()">&times;</button></div>
  <div id="historyList" style="flex:1;overflow-y:auto"></div>
</div>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<div class="sidebar" id="sidebar">
  <div class="sidebar-title">设置 <button class="sidebar-close" onclick="toggleSidebar()">×</button></div>
  <div class="sidebar-section">
    <h3>AI 服务配置</h3>
    <label>API 地址</label>
    <input type="text" id="cfgApi" placeholder="https://api.openai.com/v1">
    <label>API Key</label>
    <input type="password" id="cfgKey" placeholder="sk-...">
    <label>模型</label>
    <input type="text" id="cfgModel" placeholder="gpt-4o">
    <button class="sidebar-btn" onclick="testConnection()">测试连接</button>
    <div class="sidebar-status" id="connStatus"></div>
  </div>
  <div class="sidebar-section">
    <button class="sidebar-btn primary" onclick="saveConfig()">保存配置</button>
    <button class="sidebar-btn" onclick="loadConfig()">恢复默认</button>

  h+='<div class="result-section fade-up"><div class="result-section-title">卦象类象</div><div class="liangxiang-grid">';
  h+=renderLX(upper,'上卦')+renderLX(lower,'下卦')+'</div></div>';

  h+='<div class="score-num" style="color:'+getSC(sc)+'">'+sc+'</div><div class="score-label">满分100 · 基于体用生克</div>';
  h+='<div class="score-bar"><div class="score-fill" style="width:'+sc+'%;background:'+getSC(sc)+'"></div></div></div></div>';
  h+='<div class="btn-row"><button class="btn-ai" onclick="copyAI()">复制给AI</button><button class="btn-ai" onclick="doAIDirect()">AI 直接解读</button></div><div class="copy-hint" id="copyHint"></div>';
  var area=document.getElementById('resultsArea');area.innerHTML=h;area.className='show';
  saveToHistory({type:"meihua",time:Date.now(),question:method,summary:gn+' '+gf});

  setTimeout(function(){area.scrollIntoView({behavior:'smooth',block:'start'});},100);
}

function renderGD(upper,lower,ml){
  var h='<div class="gua-display"><div class="trigram-box"><div class="trigram-lines">';
  var uL=GUA_LINES[upper];for(var i=2;i>=0;i--){var n=i+4,d=false;for(var m=0;m<ml.length;m++){if(ml[m]===n)d=true;}h+=rL(uL[i],d);}
  h+='</div><div class="trigram-name">'+upper+' '+GUA_SYMBOLS[upper]+'</div></div><div class="gua-arrow">→</div>';
  h+='<div class="trigram-box"><div class="trigram-lines">';
  var lL=GUA_LINES[lower];for(var i=2;i>=0;i--){var n=i+1,d=false;for(var m=0;m<ml.length;m++){if(ml[m]===n)d=true;}h+=rL(lL[i],d);}
  h+='</div><div class="trigram-name">'+lower+' '+GUA_SYMBOLS[lower]+'</div></div></div>';

function rL(yang,dong){
  if(yang)return '<div style="color:'+(dong?'var(--dong)':'var(--yang)')+'">'+(dong?'━━━━━━━○':'━━━━━━━')+'</div>';
  return '<div style="color:'+(dong?'var(--dong)':'var(--yin)')+'">'+(dong?'━━ ━━×':'━━ ━━')+'</div>';
}

function renderLX(gua,label){
  var d=MEIHUA_DATA["卦象类象"][gua];
  if(!d)return '<div class="liangxiang-card"><div class="lx-title">'+gua+' · '+label+'</div><div class="lx-items">无数据</div></div>';

function getDir(wx){switch(wx){case '木':return '东方、东南方';case '火':return '南方';case '土':return '中央、东北方、西南方';case '金':return '西方、西北方';case '水':return '北方';default:return '中宫';}}

function getRem(rel,tiWX,ynWX){
  if(rel==='用克体'){var k='';for(var g in WX_KE)if(WX_KE[g]===tiWX)k=g;return '体卦'+tiWX+'受克，宜用'+WX_SHENG[tiWX]+'来化解，泄'+k+'之力';}
  if(rel==='体生用')return '体卦'+tiWX+'泄气，宜用'+WX_SHENG[tiWX]+'来补'+tiWX+'之力';
  if(rel==='用生体')return '体卦'+tiWX+'得助，顺势而为';
  if(rel==='体克用')return '体卦'+tiWX+'有力，可进取但宜谨慎';
  return '体用比和，'+tiWX+'势均，保持平衡';
}

function getAdv(rel){
  switch(rel){case '用生体':return '注意：虽有贵人相助，仍需自身努力';case '体生用':return '注意：付出较多，量力而行，注意休息';case '用克体':return '注意：外部阻力大，宜守不宜攻，化解为上';case '体克用':return '注意：虽能克服困难，但费心费力，不可大意';case '体用比和':return '注意：平稳之中求发展，不可冒进';default:return '';}
}

function getSC(s){if(s>=80)return '#44ff44';if(s>=60)return '#88cc44';if(s>=40)return '#cccc44';if(s>=20)return '#cc8844';return '#ff4444';}

function buildAI(){
  var c=window._cmh;if(!c)return '';
  var t='【梅花易数排盘结果】\r\n\r\n起卦方式：'+c.method+'\r\n'+c.note+'\r\n\r\n';
  t+='本卦：'+c.upper+'上'+c.lower+'下 → '+c.gn+' 【'+c.gf+'】\r\n';
  t+='互卦：'+c.hg.upper+'上'+c.hg.lower+'下 → '+(GUA64[c.hg.upper+c.hg.lower]||'')+'\r\n';
  t+='变卦：'+c.bg.upper+'上'+c.bg.lower+'下 → '+(GUA64[c.bg.upper+c.bg.lower]||'')+'\r\n';
  t+='动父：第'+c.ml.join(',')+'父\r\n\r\n';
  t+='体卦：'+c.ti+'('+GUA_WUXING[c.ti]+')\r\n用卦：'+c.yn+'('+GUA_WUXING[c.yn]+')\r\n';
  t+='体用关系：'+c.rel+'\r\n断语：'+(c.ri?c.ri['断语']:'')+'\r\n综合评分：'+c.sc+'/100\r\n';
  var s='你是一位精通《梅花易数》的传统术数大师。请根据以下梅花易数排盘结果，进行专业的断卦分析。\r\n分析要点：体用生克关系、卦象类象取象、互卦变卦趋势、卦气旺衰。\r\n输出结构：卦象确认→体用分析→卦象类象→互变趋势→综合断语→趋吉避凶建议。';
  return '【系统提示】\r\n'+s+'\r\n\r\n'+t;
}
function doAIDirect(){
  var t=buildAI();if(!t){document.getElementById('copyHint').textContent='请先起卦';return;}
  var s=window._cmh;if(!s){toast('请先起卦');return;}
  var url=localStorage.getItem('zy_api_base')||'';var key=localStorage.getItem('zy_api_key')||'';var model=localStorage.getItem('zy_api_model')||'gpt-4o';
  if(!url||!key){document.getElementById('copyHint').textContent='请先在设置中填写API地址和Key';toggleSidebar();return;}
  var box=showAIResult('');box.innerHTML='<div style="text-align:center;padding:20px;color:var(--dim)"><span style="display:inline-block;width:18px;height:18px;border:2px solid var(--dim);border-top:2px solid var(--gold);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:8px"></span>AI 正在断卦，请稍候…</div>';
  document.getElementById('copyHint').textContent='';
  var aiAbortCtrl=new AbortController();
  var sysPrompt='你是一位擅长梅花易数的老先生，说话简单直接，像跟晚辈唠嗑一样。请根据以下梅花易数排盘结果给出解读。分析思路：先说这个卦整体好不好，再看体卦用卦谁强谁弱、互卦变卦暗示什么走向，最后结合卦象类象给出具体建议。要求：说人话，别堆术语，多给实用建议。不好的方面委婉说，好的方面加油鼓励。';
  var apiUrl=url.replace(/\/+$/,'');if(!apiUrl.endsWith('/chat/completions'))apiUrl+='/chat/completions';fetch(apiUrl,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model:model,messages:[{role:'system',content:sysPrompt},{role:'user',content:t}],stream:true,max_tokens:2000}),signal:aiAbortCtrl.signal}).then(function(resp){
    if(!resp.ok){resp.text().then(function(errText){box.innerHTML='<div style="color:var(--red);text-align:center;padding:12px">请求失败('+resp.status+'): '+errText.substring(0,200)+'</div>'});return}
    var reader=resp.body.getReader();var decoder=new TextDecoder();var buffer='';var fullText='';
    box.innerHTML='<span class="ai-cursor"></span>';
    function readChunk(){reader.read().then(function(result){
      if(result.done){box.innerHTML=fullText;document.getElementById('copyHint').textContent='AI解读完成！';return}
      buffer+=decoder.decode(result.value,{stream:true});
      var lines=buffer.split('\n');buffer=lines.pop()||'';
      for(var i=0;i<lines.length;i++){var line=lines[i].trim();if(!line||line==='data: [DONE]')continue;if(line.indexOf('data: ')===0){try{var json=JSON.parse(line.substring(6));var delta=json.choices&&json.choices[0]&&json.choices[0].delta;if(delta&&delta.content){fullText+=delta.content;box.innerHTML=fullText+'<span class="ai-cursor"></span>';box.scrollTop=box.scrollHeight;}}catch(e){}}}
      readChunk();
    }).catch(function(e){if(e.name!=='AbortError'){box.innerHTML=fullText+'<div style="color:var(--red);font-size:12px;text-align:center;padding:8px">读取中断: '+e.message+'</div>'}});}
    readChunk();
  }).catch(function(e){if(e.name!=='AbortError'){box.innerHTML='<div style="color:var(--red);text-align:center;padding:12px">请求失败: '+e.message+'</div>'}});
}
function copyAI(){
  var t=buildAI();if(!t){document.getElementById('copyHint').textContent='请先起卦';return;}
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(function(){document.getElementById('copyHint').textContent='已复制！粘贴给AI即可';}).catch(function(){fbCopy(t);});}else{fbCopy(t);}
}
function fbCopy(t){var a=document.createElement('textarea');a.value=t;a.style.cssText='position:fixed;left:-9999px';document.body.appendChild(a);a.select();try{document.execCommand('copy');document.getElementById('copyHint').textContent='已复制！';}catch(e){document.getElementById('copyHint').textContent='复制失败';}document.body.removeChild(a);}

function toggleSidebar(){document.getElementById('sidebarOverlay').classList.toggle('show');document.getElementById('sidebar').classList.toggle('show');}

function testConnection(){var a=document.getElementById('cfgApi').value.trim(),k=document.getElementById('cfgKey').value.trim();if(!a||!k){document.getElementById('connStatus').textContent='请填写API地址和Key';document.getElementById('connStatus').style.color='var(--red)';return;}document.getElementById('connStatus').textContent='测试中...';document.getElementById('connStatus').style.color='var(--dim)';var apiUrl=a.replace(/\/+$/,'');if(!apiUrl.endsWith('/chat/completions'))apiUrl+='/chat/completions';fetch(apiUrl,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+k},body:JSON.stringify({model:document.getElementById('cfgModel').value||'gpt-4o',messages:[{role:'user',content:'hi'}],max_tokens:5})}).then(function(r){if(r.ok){document.getElementById('connStatus').textContent='连接成功 ✓';document.getElementById('connStatus').style.color='var(--green)';}else{document.getElementById('connStatus').textContent='连接失败 ('+r.status+')';document.getElementById('connStatus').style.color='var(--red)';}}).catch(function(){document.getElementById('connStatus').textContent='网络错误';document.getElementById('connStatus').style.color='var(--red)';});}

function openHistory(){renderHistory();document.getElementById('historyOverlay').classList.add('show');document.getElementById('historyPanel').classList.add('show')}
function closeHistory(){document.getElementById('historyOverlay').classList.remove('show');document.getElementById('historyPanel').classList.remove('show')}

function renderHistory(){var h=getHistory();var box=document.getElementById('historyList');if(!h.length){box.innerHTML='<div style="text-align:center;color:var(--dim);padding:40px 0;">暂无记录</div>';return}var typeLabel={liuyao:'六爻',meihua:'梅花',qimen:'奇门'};var html='<div style="text-align:right;margin-bottom:10px;"><button onclick="clearHistory()" style="background:none;border:1px solid var(--dim2);color:var(--dim);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;">清除全部</button></div>';for(var i=0;i<h.length;i++){var r=h[i];var t=new Date(r.time);var timeStr=(t.getMonth()+1)+'/'+t.getDate()+' '+t.getHours()+':'+String(t.getMinutes()).padStart(2,'0');var badge=typeLabel[r.type]||r.type;var link=r.type+'.html';html+='<div style="background:var(--card2);border-radius:8px;padding:10px 12px;margin-bottom:8px;cursor:pointer;" onclick="location.href=\''+link+'\'">';html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">';html+='<span style="color:var(--gold);font-size:12px;font-weight:700;">'+badge+'</span>';html+='<span style="color:var(--dim);font-size:11px;">'+timeStr+'</span></div>';html+='<div style="font-size:13px;color:var(--text);">'+(r.question||'未记录')+'</div>';html+='<div style="font-size:12px;color:var(--text2);margin-top:2px;">'+(r.summary||'')+'</div>';html+='</div>'}box.innerHTML=html}

loadConfig();fillTime();toast("选择起卦方式后点击 起卦");

/* ===== 粒子特效系统 ===== */
(function(){
  var canvas=document.createElement('canvas');
  canvas.id='particleCanvas';
  canvas.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1';
  document.body.prepend(canvas);
  var ctx=canvas.getContext('2d');
  var W,H;
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
  resize();window.addEventListener('resize',resize);
  
  var fireflies=[];
  for(var i=0;i<15;i++){
    fireflies.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.3,r:Math.random()*2+1,phase:Math.random()*Math.PI*2,speed:Math.random()*.02+.01,hue:Math.random()>.5?50:200});
  }
  
  var magicDust=[];
  for(var i=0;i<30;i++){
    magicDust.push({x:Math.random()*W,y:Math.random()*H,size:Math.random()*2+.5,opacity:Math.random(),phase:Math.random()*Math.PI*2,speed:.02+Math.random()*.03,hue:40+Math.random()*40});
  }
  
  var twinklingStars=[];
  for(var i=0;i<50;i++){
    twinklingStars.push({x:Math.random()*W,y:Math.random()*H,size:Math.random()*1.5+.5,phase:Math.random()*Math.PI*2,speed:.02+Math.random()*.04});
  }
  
  var shootingStars=[];
  function spawnShootingStar(){
    if(shootingStars.length>2)return;
    shootingStars.push({x:Math.random()*W*.8,y:Math.random()*H*.3,vx:4+Math.random()*5,vy:2+Math.random()*2,life:1,decay:.01+Math.random()*.015,len:50+Math.random()*70});
  }
  
  var ripples=[];
  function spawnRipple(){
    if(ripples.length>3)return;
    ripples.push({x:Math.random()*W,y:Math.random()*H,r:0,maxR:60+Math.random()*80,life:1,decay:.006+Math.random()*.008});
  }
  
  var frame=0;
  var lastTime=0;
  
  function draw(timestamp){
    if(!lastTime)lastTime=timestamp;
    var delta=timestamp-lastTime;
    if(delta<33){requestAnimationFrame(draw);return;}
    lastTime=timestamp;
    
    ctx.clearRect(0,0,W,H);frame++;
    
    for(var i=0;i<twinklingStars.length;i++){
      var s=twinklingStars[i];
      s.phase+=s.speed;
      var alpha=.2+.8*Math.abs(Math.sin(s.phase));
      ctx.fillStyle='rgba(255,255,255,'+alpha+')';
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
      ctx.fill();
    }
    
    for(var i=0;i<fireflies.length;i++){
      var f=fireflies[i];
      f.x+=f.vx;f.y+=f.vy;f.phase+=f.speed;
      if(f.x<0)f.x=W;if(f.x>W)f.x=0;if(f.y<0)f.y=H;if(f.y>H)f.y=0;
      var glow=.3+.7*Math.abs(Math.sin(f.phase));
      var alpha=glow*.8;
      var grd=ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,f.r*4);
      grd.addColorStop(0,'hsla('+f.hue+',80%,70%,'+alpha+')');
      grd.addColorStop(.4,'hsla('+f.hue+',80%,50%,'+(alpha*.4)+')');
      grd.addColorStop(1,'hsla('+f.hue+',80%,50%,0)');
      ctx.fillStyle=grd;ctx.beginPath();ctx.arc(f.x,f.y,f.r*4,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='hsla('+f.hue+',90%,85%,'+alpha+')';ctx.beginPath();ctx.arc(f.x,f.y,f.r,0,Math.PI*2);ctx.fill();
    }
    
    if(frame%2===0){
      for(var i=0;i<magicDust.length;i++){
        var d=magicDust[i];
        d.phase+=d.speed;
        d.opacity=.2+.8*Math.abs(Math.sin(d.phase));
        d.y-=.1;
        if(d.y<-10)d.y=H+10;
        ctx.fillStyle='hsla('+d.hue+',80%,70%,'+d.opacity+')';
        ctx.beginPath();
        ctx.arc(d.x,d.y,d.size,0,Math.PI*2);
        ctx.fill();
      }
    }
    
    if(frame%300===0)spawnShootingStar();
    for(var i=shootingStars.length-1;i>=0;i--){
      var s=shootingStars[i];
      s.x+=s.vx;s.y+=s.vy;s.life-=s.decay;
      if(s.life<=0){shootingStars.splice(i,1);continue}
      var tx=s.x-s.vx*s.len*.15,ty=s.y-s.vy*s.len*.15;
      var grd=ctx.createLinearGradient(tx,ty,s.x,s.y);
      grd.addColorStop(0,'rgba(255,255,255,0)');grd.addColorStop(1,'rgba(255,255,255,'+s.life*.8+')');
      ctx.strokeStyle=grd;ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(s.x,s.y);ctx.stroke();
      var hg=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,4);
      hg.addColorStop(0,'rgba(255,255,255,'+s.life+')');hg.addColorStop(1,'rgba(255,215,0,0)');
      ctx.fillStyle=hg;ctx.beginPath();ctx.arc(s.x,s.y,4,0,Math.PI*2);ctx.fill();
    }
    
    if(frame%400===0)spawnRipple();
    for(var i=ripples.length-1;i>=0;i--){
      var rp=ripples[i];
      rp.r+=.8;rp.life-=rp.decay;
      if(rp.life<=0){ripples.splice(i,1);continue}
      ctx.strokeStyle='rgba(68,170,255,'+rp.life*.3+')';ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(rp.x,rp.y,rp.r,0,Math.PI*2);ctx.stroke();
      if(rp.r>15){ctx.strokeStyle='rgba(68,170,255,'+rp.life*.15+')';ctx.beginPath();ctx.arc(rp.x,rp.y,rp.r*.6,0,Math.PI*2);ctx.stroke()}
    }
    
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();
