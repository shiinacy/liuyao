<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a16">
<title>周易六爻占卜</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0a16;--card:#111125;--card2:#0e0e1e;--gold:#ffd700;--gold2:#b8960f;--dim:#555577;--dim2:#333355;--yang:#44aaff;--yin:#6688ff;--dong:#ffdd00;--green:#44ff44;--red:#ff4444;--text:#ccccdd;--text2:#9999bb;--sidebar-w:min(320px,85vw)}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:520px;margin:0 auto;overflow-x:hidden;padding-bottom:40px;padding-left:env(safe-area-inset-left,0px);padding-right:env(safe-area-inset-right,0px)}
.header{text-align:center;padding:28px 16px 12px;background:linear-gradient(180deg,#151530,var(--bg));position:relative}
.back-btn{position:absolute;left:12px;top:28px;color:var(--gold);text-decoration:none;font-size:14px;opacity:.8;padding:4px 8px}
.back-btn:hover{opacity:1}
.header h1{font-size:22px;color:var(--gold);text-shadow:0 0 20px rgba(255,215,0,.3);letter-spacing:4px}
.header p{font-size:10px;color:var(--dim);margin-top:4px;letter-spacing:2px}
.settings-btn{position:absolute;right:12px;top:28px;background:none;border:none;color:var(--dim);font-size:20px;cursor:pointer;padding:4px 8px}
.settings-btn:hover{color:var(--gold)}
.card{background:var(--card);border-radius:12px;padding:14px;margin:8px 12px;border:1px solid #1a1a35}
.input-row{padding:8px 12px}
.input-row input{width:100%;background:#15152a;border:1px solid #2a2a44;border-radius:8px;padding:10px 12px;color:#fff;font-size:14px;outline:none}
.input-row input:focus{border-color:var(--gold)}
.input-row input::placeholder{color:#444466;font-size:13px}
.coin-area{text-align:center}
.coins{display:flex;justify-content:center;gap:16px;margin:8px 0}
.coin{width:56px;height:56px;border-radius:50%;border:2px solid var(--gold2);background:#1e1e36;display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--gold);transition:all .12s}
.coin.y3{background:#332a10;border-color:#ffaa00;color:#ffaa00;box-shadow:0 0 12px rgba(255,170,0,.4)}
.coin.y2{background:#1e2a44;border-color:#6688ff;color:#6688ff;box-shadow:0 0 12px rgba(102,136,255,.3)}
.coin-status{font-size:12px;color:var(--dim);min-height:16px}
.coin-result{font-size:15px;font-weight:700;color:var(--gold);min-height:20px;margin-top:2px}
.btns{display:flex;justify-content:center;gap:10px;padding:6px 12px 10px}
.btn{border:none;border-radius:10px;padding:12px 20px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;letter-spacing:1px}
.btn:active{transform:scale(.96)}
.btn-cast{background:linear-gradient(135deg,#cc3333,#aa2222);color:#fff;flex:1}
.btn-cast:disabled{background:#444455;color:#666;cursor:default}
.btn-cancel{background:#333355;color:#aaa;flex:.6}
.btn-cancel:disabled{opacity:.4;cursor:default}
.progress{display:flex;justify-content:center;gap:4px;padding:4px 12px}
.prog-dot{width:38px;text-align:center;border-radius:6px;padding:4px 0;font-size:11px;background:var(--card2);color:var(--dim);transition:all .2s}
.prog-dot.done{background:#226644;color:#fff}
.yao-table{padding:4px 12px}
.yao-row{display:flex;align-items:center;padding:6px 10px;border-radius:5px;margin-bottom:1px;background:var(--card2);gap:2px;min-width:0}
.yao-row .pos{width:22px;min-width:22px;font-size:11px;color:var(--dim)}
.yao-row .sym{flex:1;font-size:12px;color:var(--dim2);font-family:monospace;letter-spacing:1px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.yao-row .gz{width:34px;min-width:34px;font-size:10px;color:#4488ff;text-align:center}
.yao-row .lq{width:30px;min-width:30px;font-size:10px;color:#44ff44;text-align:center}
.yao-row .tag{width:36px;min-width:36px;font-size:9px;color:var(--dong);text-align:center}
.result-card{text-align:center;display:none}.result-card.show{display:block}
.gua-name{font-size:20px;font-weight:700;color:var(--gold)}
.fortune{font-size:16px;font-weight:700;margin-top:2px}
.wx-info{font-size:11px;color:#aaa;margin-top:2px}
.ty-info{font-size:11px;color:#4488ff;margin-top:1px}
.analysis-card{display:none;padding-bottom:20px}.analysis-card.show{display:block}
.analysis-title{text-align:center;font-size:15px;font-weight:700;color:var(--gold);padding-bottom:8px}
.analysis-box{background:#0c0c1a;border-radius:8px;padding:12px;font-size:12px;line-height:1.8;color:#bbbbcc;max-height:50vh;overflow-y:auto;white-space:pre-wrap;font-family:"Courier New",monospace}
.copy-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px;flex-wrap:wrap}
.btn-copy{background:#2255aa;color:#fff;border:none;border-radius:8px;padding:10px 16px;font-size:13px;cursor:pointer}
.btn-copy:active{background:#1a4488}
.btn-ai{background:linear-gradient(135deg,#8844cc,#6633aa);color:#fff;border:none;border-radius:8px;padding:10px 16px;font-size:13px;cursor:pointer}
.btn-ai:active{background:#553399}
.btn-ai:disabled{background:#444455;color:#666;cursor:default}
.copy-hint{font-size:11px;color:#44ff44;min-height:16px;width:100%;text-align:center}
.ai-card{display:none;padding-bottom:20px}.ai-card.show{display:block}
.ai-title{text-align:center;font-size:15px;font-weight:700;color:#cc88ff;padding-bottom:8px}
.ai-box{background:#0c0c1a;border-radius:8px;padding:12px;font-size:13px;line-height:1.8;color:#ccccdd;max-height:60vh;overflow-y:auto;white-space:pre-wrap}
.ai-box .cursor{display:inline-block;width:2px;height:1em;background:var(--gold);animation:blink 1s infinite;vertical-align:text-bottom}
@keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
.ai-loading{text-align:center;padding:20px;color:var(--dim)}
.ai-loading .spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--dim);border-top:2px solid var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.ai-error{color:var(--red);font-size:12px;text-align:center;padding:8px}
.ai-hint{color:var(--dim);font-size:12px;text-align:center;padding:12px}
.sidebar-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:998;opacity:0;transition:opacity .4s}
.sidebar-overlay.show{display:block;opacity:1}
.sidebar{position:fixed;top:0;right:0;width:var(--sidebar-w);height:100%;background:linear-gradient(180deg,rgba(17,17,37,.98),rgba(10,10,22,.99));z-index:999;transform:translateX(100%);transition:transform .4s cubic-bezier(.22,1,.36,1);overflow-y:auto;padding:20px 16px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-left:1px solid rgba(255,215,0,.1);box-shadow:-4px 0 30px rgba(0,0,0,.5)}
.sidebar.show{transform:translateX(0)}
.sidebar-title{font-size:16px;font-weight:700;color:var(--gold);margin-bottom:16px;padding-bottom:12px;display:flex;align-items:center;justify-content:space-between;position:relative}
.sidebar-close{background:none;border:none;color:var(--dim);font-size:22px;cursor:pointer;padding:4px 8px}
.sidebar-close:hover{color:var(--gold)}
.sidebar-section{margin-bottom:16px}
.sidebar-section label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px}
.sidebar-section input,.sidebar-section select{width:100%;background:#15152a;border:1px solid #2a2a44;border-radius:8px;padding:10px 12px;color:#fff;font-size:13px;outline:none}
.sidebar-section input:focus,.sidebar-section select:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(255,215,0,.12),0 0 20px rgba(255,215,0,.06)}
.sidebar-section input::placeholder{color:#444466}
.btn-test{background:#335533;color:#aaffaa;border:none;border-radius:8px;padding:10px 16px;font-size:13px;cursor:pointer;width:100%;margin-top:8px}
.btn-test:active{background:#224422;transform:scale(.97)}
.test-hint{font-size:11px;color:var(--dim);min-height:16px;margin-top:4px;text-align:center}
.btn-save{background:linear-gradient(135deg,#cc3333,#aa2222);color:#fff;border:none;border-radius:8px;padding:10px 16px;font-size:13px;cursor:pointer;width:100%;margin-top:8px;transition:all .15s}
.footer{text-align:center;padding:12px;font-size:10px;color:#333355}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .3s ease}
@media(max-width:360px){
  .header h1{font-size:18px;letter-spacing:2px}
  .coins{gap:10px}
  .coin{width:48px;height:48px;font-size:24px}
  .btn{padding:10px 14px;font-size:13px}
  .prog-dot{width:32px;font-size:10px;padding:3px 0}
  .yao-row{padding:5px 6px}
  .analysis-box{font-size:11px;padding:8px}
}
.hist-btn{position:absolute;right:52px;top:28px;background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer;padding:4px 8px}
.hist-btn:hover{color:var(--gold)}
.sidebar::before{content:"";position:absolute;top:0;left:0;width:1px;height:100%;background:linear-gradient(180deg,transparent,rgba(255,215,0,.4),rgba(68,170,255,.2),transparent);animation:sidebarGlow 3s ease-in-out infinite}
@keyframes sidebarGlow{0%,100%{opacity:.4}50%{opacity:1}}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-track{background:transparent}
.sidebar::-webkit-scrollbar-thumb{background:rgba(255,215,0,.2);border-radius:3px}
.sidebar::-webkit-scrollbar-thumb:hover{background:rgba(255,215,0,.4)}


/* ===== 炫酷特效 ===== */
/* 星空背景 */
body::after {
  content: '';
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background:
    radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,.6), transparent),
    radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,.4), transparent),
    radial-gradient(1px 1px at 50% 10%, rgba(255,215,0,.5), transparent),
    radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,.3), transparent),
    radial-gradient(1px 1px at 90% 40%, rgba(255,215,0,.4), transparent),
    radial-gradient(1px 1px at 15% 85%, rgba(68,170,255,.4), transparent),
    radial-gradient(1px 1px at 45% 45%, rgba(255,255,255,.5), transparent),
    radial-gradient(1px 1px at 65% 25%, rgba(255,215,0,.3), transparent),
    radial-gradient(1px 1px at 85% 65%, rgba(68,170,255,.3), transparent),
    radial-gradient(1px 1px at 25% 35%, rgba(255,255,255,.4), transparent),
    radial-gradient(1.5px 1.5px at 55% 75%, rgba(255,215,0,.5), transparent),
    radial-gradient(1px 1px at 5% 50%, rgba(255,255,255,.3), transparent),
    radial-gradient(1px 1px at 75% 15%, rgba(68,170,255,.4), transparent),
    radial-gradient(1px 1px at 35% 90%, rgba(255,215,0,.3), transparent),
    radial-gradient(1.5px 1.5px at 95% 5%, rgba(255,255,255,.5), transparent);
  pointer-events: none;
  z-index: 0;
  animation: starTwinkle 4s ease-in-out infinite alternate;
}
@keyframes starTwinkle {
  0% { opacity: .5; }
  50% { opacity: .9; }
  100% { opacity: .6; }
}

/* 流星效果 */
@keyframes shootingStar {
  0% { transform: translate(0, 0) rotate(-45deg); opacity: 1; }
  70% { opacity: 1; }
  100% { transform: translate(300px, 300px) rotate(-45deg); opacity: 0; }
}

/* 标题呼吸发光 */
.header h1 {
  animation: titleGlow 3s ease-in-out infinite;
}
@keyframes titleGlow {
  0%, 100% { text-shadow: 0 0 20px rgba(255,215,0,.2), 0 0 40px rgba(255,215,0,.05); }
  50% { text-shadow: 0 0 30px rgba(255,215,0,.4), 0 0 60px rgba(255,215,0,.1), 0 0 80px rgba(255,215,0,.05); }
}
/* 卡片悬浮光效 */
.card {
  position: relative;
  overflow: hidden;
  transition: transform .3s, box-shadow .3s, border-color .3s;
}
.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(0,0,0,.3), 0 0 30px rgba(255,215,0,.05);
  border-color: rgba(255,215,0,.15);
}
.card::after {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: linear-gradient(45deg, transparent 40%, rgba(255,215,0,.02) 50%, transparent 60%);
  transform: translateX(-100%);
  transition: transform .8s;
  pointer-events: none;
}
.card:hover::after {
  transform: translateX(100%);
}
/* 按钮脉冲 */
.btn-cast {
  position: relative;
  overflow: hidden;
}
.btn-cast::before {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  width: 0; height: 0;
  background: rgba(255,255,255,.15);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  transition: width .5s, height .5s;
}
.btn-cast:active::before {
  width: 300px; height: 300px;
}

#particleCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
</style>
</head>

    <button class="btn-test" id="btnTest">测试连接</button>
    <div class="test-hint" id="testHint"></div>

    <button class="btn-save" id="btnSave">保存设置</button>
  </div>
</div>
<script>
// ===== DATA =====

var GUA64={"乾乾":{"name":"乾为天","number":1,"meaning":"元亨利贞","fortune":"大吉","desc":"天行健，君子以自强不息。刚健中正，事业亨通。","chuyu":"《周易·乾卦》"},"坤坤":{"name":"坤为地","number":2,"meaning":"元亨，利牝马之贞","fortune":"大吉","desc":"地势坤，君子以厚德载物。柔顺承载，厚德载物。","chuyu":"《周易·坤卦》"},"坎震":{"name":"水雷屯","number":3,"meaning":"元亨利贞，勿用有攸往","fortune":"小凶","desc":"云雷屯，君子以经纶。万事开头难，宜守正待时。","chuyu":"《周易·屯卦》"},"艮坎":{"name":"山水蒙","number":4,"meaning":"亨。匪我求童蒙，童蒙求我","fortune":"小凶","desc":"山下出泉，蒙。君子以果行育德。启蒙教育，虚心求教。","chuyu":"《周易·蒙卦》"},"坎乾":{"name":"水天需","number":5,"meaning":"有孚，光亨，贞吉","fortune":"吉","desc":"云上于天，需。君子以饮食宴乐。诚信等待，把握时机。","chuyu":"《周易·需卦》"},"乾坎":{"name":"天水讼","number":6,"meaning":"有孚窒惕，中吉","fortune":"凶","desc":"天与水违行，讼。君子以作事谋始。争讼不利，宜慎始。","chuyu":"《周易·讼卦》"},"坤坎":{"name":"地水师","number":7,"meaning":"贞，丈人吉，无咎","fortune":"吉","desc":"地中有水，师。君子以容民畜众。统帅之道，正道而行。","chuyu":"《周易·师卦》"},"坎坤":{"name":"水地比","number":8,"meaning":"吉。原筮元永贞，无咎","fortune":"吉","desc":"地上有水，比。先王以建万国，亲诸侯。亲比辅佐，和睦相处。","chuyu":"《周易·比卦》"},"巽乾":{"name":"风天小畜","number":9,"meaning":"亨。密云不雨，自我西郊","fortune":"小吉","desc":"风行天上，小畜。君子以懿文德。小有积蓄，循序渐进。","chuyu":"《周易·小畜卦》"},"乾兑":{"name":"天泽履","number":10,"meaning":"履虎尾，不咥人，亨","fortune":"吉","desc":"上天下泽，履。君子以辩上下，定民志。谨慎行事，礼待他人。","chuyu":"《周易·履卦》"},"坤乾":{"name":"地天泰","number":11,"meaning":"小往大来，吉亨","fortune":"大吉","desc":"天地交泰，后以财成天地之道。通泰安宁，万事顺遂。","chuyu":"《周易·泰卦》"},"乾坤":{"name":"天地否","number":12,"meaning":"否之匪人，不利君子贞","fortune":"大凶","desc":"天地不交，否。君子以俭德辟难。天地不交，诸事不顺。","chuyu":"《周易·否卦》"},"乾离":{"name":"天火同人","number":13,"meaning":"同人于野，亨","fortune":"吉","desc":"天与火，同人。君子以类族辨物。和睦相处，志同道合。","chuyu":"《周易·同人卦》"},"离乾":{"name":"火天大有","number":14,"meaning":"元亨","fortune":"大吉","desc":"火在天上，大有。君子以遏恶扬善，顺天休命。大有收获，事业兴旺。","chuyu":"《周易·大有卦》"},"坤艮":{"name":"地山谦","number":15,"meaning":"亨，君子有终","fortune":"大吉","desc":"地中有山，谦。君子以裒多益寡，称物平施。谦虚美德，亨通顺利。","chuyu":"《周易·谦卦》"},"震坤":{"name":"雷地豫","number":16,"meaning":"利建侯行师","fortune":"吉","desc":"雷出地奋，豫。先王以作乐崇德。欢乐安逸，宜建功立业。","chuyu":"《周易·豫卦》"},"兑震":{"name":"泽雷随","number":17,"meaning":"元亨利贞，无咎","fortune":"吉","desc":"泽中有雷，随。君子以向晦入宴息。随和顺从，与时俱进。","chuyu":"《周易·随卦》"},"艮巽":{"name":"山风蛊","number":18,"meaning":"元亨，利涉大川","fortune":"凶","desc":"山下有风，蛊。君子以振民育德。革除积弊，振作精神。","chuyu":"《周易·蛊卦》"},"坤兑":{"name":"地泽临","number":19,"meaning":"元亨利贞","fortune":"大吉","desc":"泽上有地，临。君子以教思无穷，容保民无疆。居上临下，恩威并施。","chuyu":"《周易·临卦》"},"巽坤":{"name":"风地观","number":20,"meaning":"盥而不荐，有孚颙若","fortune":"小吉","desc":"风行地上，观。先王以省方观民设教。观察瞻仰，审时度势。","chuyu":"《周易·观卦》"},"离震":{"name":"火雷噬嗑","number":21,"meaning":"亨，利用狱","fortune":"小吉","desc":"雷电噬嗑，先王以明罚敕法。决断刑狱，明辨是非。","chuyu":"《周易·噬嗑卦》"},"艮离":{"name":"山火贲","number":22,"meaning":"亨，小利有攸往","fortune":"小吉","desc":"山下有火，贲。君子以明庶政，无敢折狱。文饰光明，注重形式。","chuyu":"《周易·贲卦》"},"艮坤":{"name":"山地剥","number":23,"meaning":"不利有攸往","fortune":"凶","desc":"山附于地，剥。上以厚下安宅。剥落衰败，宜守不宜攻。","chuyu":"《周易·剥卦》"},"坤震":{"name":"地雷复","number":24,"meaning":"亨。出入无疾，朋来无咎","fortune":"吉","desc":"雷在地中，复。先王以至日闭关。回归复始，重新开始。","chuyu":"《周易·复卦》"},"乾震":{"name":"天雷无妄","number":25,"meaning":"元亨利贞","fortune":"吉","desc":"天下雷行，物与无妄。先王以茂对时育万物。无妄之行，顺应自然。","chuyu":"《周易·无妄卦》"},"艮乾":{"name":"山天大畜","number":26,"meaning":"利贞，不家食吉","fortune":"大吉","desc":"天在山中，大畜。君子以多识前言往行，以畜其德。大有积蓄，厚积薄发。","chuyu":"《周易·大畜卦》"},"艮震":{"name":"山雷颐","number":27,"meaning":"贞吉。观颐，自求口实","fortune":"吉","desc":"山下有雷，颐。君子以慎言语，节饮食。颐养之道，修身养性。","chuyu":"《周易·颐卦》"},"兑巽":{"name":"泽风大过","number":28,"meaning":"栋桡，利有攸往，亨","fortune":"凶","desc":"泽灭木，大过。君子以独立不惧，遁世无闷。栋梁弯曲，力不胜任。","chuyu":"《周易·大过卦》"},"坎坎":{"name":"坎为水","number":29,"meaning":"习坎，有孚，维心亨","fortune":"凶","desc":"水洊至，习坎。君子以常德行，习教事。重重险陷，谨慎前行。","chuyu":"《周易·坎卦》"},"离离":{"name":"离为火","number":30,"meaning":"利贞，亨。畜牝牛，吉","fortune":"吉","desc":"明两作离，大人以继明照于四方。附丽光明，依附正道。","chuyu":"《周易·离卦》"},"兑艮":{"name":"泽山咸","number":31,"meaning":"亨，利贞，取女吉","fortune":"大吉","desc":"山上有泽，咸。君子以虚受人。感应相通，以诚相待。","chuyu":"《周易·咸卦》"},"震巽":{"name":"雷风恒","number":32,"meaning":"亨，无咎，利贞","fortune":"吉","desc":"雷风恒，君子以立不易方。恒久不变，持之以恒。","chuyu":"《周易·恒卦》"},"乾艮":{"name":"天山遁","number":33,"meaning":"亨，小利贞","fortune":"小凶","desc":"天下有山，遁。君子以远小人，不恶而严。退避隐遁，明哲保身。","chuyu":"《周易·遁卦》"},"震乾":{"name":"雷天大壮","number":34,"meaning":"利贞","fortune":"吉","desc":"雷在天上，大壮。君子以非礼弗履。刚强壮盛，守正不阿。","chuyu":"《周易·大壮卦》"},"离坤":{"name":"火地晋","number":35,"meaning":"康侯用锡马蕃庶，昼日三接","fortune":"大吉","desc":"明出地上，晋。君子以自昭明德。晋升发展，前途光明。","chuyu":"《周易·晋卦》"},"坤离":{"name":"地火明夷","number":36,"meaning":"利艰贞","fortune":"凶","desc":"明入地中，明夷。君子以莅众，用晦而明。光明受损，韬光养晦。","chuyu":"《周易·明夷卦》"},"巽离":{"name":"风火家人","number":37,"meaning":"利女贞","fortune":"吉","desc":"风自火出，家人。君子以言有物而行有恒。家庭和睦，各安其位。","chuyu":"《周易·家人卦》"},"离兑":{"name":"火泽睽","number":38,"meaning":"小事吉","fortune":"小凶","desc":"上火下泽，睽。君子以同而异。乖违背离，求同存异。","chuyu":"《周易·睽卦》"},"坎艮":{"name":"水山蹇","number":39,"meaning":"利西南，不利东北","fortune":"凶","desc":"山上有水，蹇。君子以反身修德。艰难险阻，反省自身。","chuyu":"《周易·蹇卦》"},"震坎":{"name":"雷水解","number":40,"meaning":"利西南，无所往","fortune":"吉","desc":"雷雨作，解。君子以赦过宥罪。解除困难，宽以待人。","chuyu":"《周易·解卦》"},"艮兑":{"name":"山泽损","number":41,"meaning":"有孚，元吉，无咎","fortune":"小凶","desc":"山下有泽，损。君子以惩忿窒欲。减损之道，克制欲望。","chuyu":"《周易·损卦》"},"巽震":{"name":"风雷益","number":42,"meaning":"利有攸往，利涉大川","fortune":"大吉","desc":"风雷益，君子以见善则迁，有过则改。增益之道，见贤思齐。","chuyu":"《周易·益卦》"},"兑乾":{"name":"泽天夬","number":43,"meaning":"扬于王庭，孚号有厉","fortune":"小凶","desc":"泽上于天，夬。君子以施禄及下，居德则忌。决断刚健，果断行事。","chuyu":"《周易·夬卦》"},"乾巽":{"name":"天风姤","number":44,"meaning":"女壮，勿用取女","fortune":"小凶","desc":"天下有风，姤。后以施命诰四方。不期而遇，谨慎应对。","chuyu":"《周易·姤卦》"},"兑坤":{"name":"泽地萃","number":45,"meaning":"亨，王假有庙","fortune":"吉","desc":"泽上于地，萃。君子以除戎器，戒不虞。聚集汇合，团结一心。","chuyu":"《周易·萃卦》"},"坤巽":{"name":"地风升","number":46,"meaning":"元亨，用见大人","fortune":"大吉","desc":"地中生木，升。君子以顺德，积小以高大。上升进步，步步高升。","chuyu":"《周易·升卦》"},"兑坎":{"name":"泽水困","number":47,"meaning":"亨，贞，大人吉","fortune":"凶","desc":"泽无水，困。君子以致命遂志。困顿穷迫，坚守志向。","chuyu":"《周易·困卦》"},"坎巽":{"name":"水风井","number":48,"meaning":"改邑不改井，无丧无得","fortune":"吉","desc":"木上有水，井。君子以劳民劝相。井养不穷，泽被苍生。","chuyu":"《周易·井卦》"},"兑离":{"name":"泽火革","number":49,"meaning":"巳日乃孚，元亨利贞","fortune":"吉","desc":"泽中有火，革。君子以治历明时。变革更新，顺应时势。","chuyu":"《周易·革卦》"},"离巽":{"name":"火风鼎","number":50,"meaning":"元吉，亨"     a.push("  "+y.sh.padEnd(4,"  ")+" "+yn.padEnd(4,"  ")+" "+y.gz+"  "+y.lq.padEnd(4,"  ")+" "+(y.ny||"").padEnd(6,"  ")+" "+t.join(" "));
  }
  a.push("");
  a.push("【动爻】");
  if(g.cp.length>0){for(var ci=0;ci<g.cp.length;ci++){var p=g.cp[ci],y2=g.ys[p-1];var yn2=(y2.yy?"九":"六")+YAO_NAMES[p-1];a.push("  "+yn2+"发动 -> 变"+y2.ny)}}
  else{a.push("  静卦，无动爻")}
  a.push("");
  if(g.cp.length>0){a.push("【变卦】"+g.bi.name+" "+g.bi.fortune);a.push("")}
  a.push("【卦辞】");
  a.push("  "+g.inf.desc);
  a.push("  出处：《"+g.inf.chuyu+"》");
  a.push("");
  var fd={"大吉":"诸事顺遂，可放心进取","吉":"事宜积极，把握时机","小吉":"谨慎渐进为佳","小凶":"宜守不宜攻，需谨慎","凶":"诸事宜缓，不可冒进","大凶":"诸事不宜，谨慎再谨慎"};
  a.push("【综合断语】");
  a.push("  "+(fd[g.inf.fortune]||"顺其自然")+"。");
  a.push(L);
  return a.join("\n");
}

// ===== AI STREAMING =====
var aiAbort=null;
function doAIDivination(){
  if(!currentGua){document.getElementById("copyHint").textContent="请先完成占卜";toast("请先完成占卜");return}
  var s=getSettings();
  if(!s.apiUrl||!s.apiKey){
    document.getElementById("aiCard").className="card ai-card show fade-up";
    document.getElementById("aiBox").innerHTML='<div class="ai-hint">请先在设置中配置 API</div>';
    return;
  }
  if(aiAbort){aiAbort.abort();aiAbort=null}
  var analysisText=doAnalyze(currentGua);
  var model=s.model||"gpt-4o-mini";
  var aiBox=document.getElementById("aiBox");
  var aiCard=document.getElementById("aiCard");
  aiCard.className="card ai-card show fade-up";
  aiBox.innerHTML='<div class="ai-loading"><span class="spinner"></span>AI 正在断卦，请稍候…</div>';
  document.getElementById("btnAI").disabled=true;
  aiAbort=new AbortController();
  var body=JSON.stringify({model:model,messages:[{role:"system",content:AI_SYS_PROMPT},{role:"user",content:analysisText}],stream:true,max_tokens:2048});
  var apiUrl=s.apiUrl.replace(/\/+$/,"");if(!apiUrl.endsWith("/chat/completions"))apiUrl+="/chat/completions";fetch(apiUrl,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+s.apiKey},body:body,signal:aiAbort.signal}).then(function(response){
    if(!response.ok){response.text().then(function(t){aiBox.innerHTML='<div class="ai-error">请求失败 ('+response.status+'): '+t.substring(0,200)+'</div>'});document.getElementById("btnAI").disabled=false;return}
    var reader=response.body.getReader();
    var decoder=new TextDecoder();
    var buffer="";
    var fullText="";
    aiBox.innerHTML='<span class="cursor"></span>';
    function readChunk(){
      reader.read().then(function(result){
        if(result.done){aiBox.innerHTML=fullText;document.getElementById("btnAI").disabled=false;aiAbort=null;return}
        buffer+=decoder.decode(result.value,{stream:true});
        var lines=buffer.split("\n");
        buffer=lines.pop()||"";
        for(var i=0;i<lines.length;i++){
          var line=lines[i].trim();
          if(!line||line==="data: [DONE]")continue;
          if(line.indexOf("data: ")===0){
            try{
              var json=JSON.parse(line.substring(6));
              var delta=json.choices&&json.choices[0]&&json.choices[0].delta;
              if(delta&&delta.content){
                fullText+=delta.content;
                aiBox.innerHTML=fullText+'<span class="cursor"></span>';
                aiBox.scrollTop=aiBox.scrollHeight;
              }
            }catch(e){}
          }
        }
        readChunk();
      }).catch(function(e){
        if(e.name!=="AbortError"){aiBox.innerHTML=fullText+'<div class="ai-error">读取中断: '+e.message+'</div>'}
        document.getElementById("btnAI").disabled=false;aiAbort=null;
      });
    }
    readChunk();
  }).catch(function(e){
    if(e.name!=="AbortError"){aiBox.innerHTML='<div class="ai-error">请求失败: '+e.message+'</div>'}
    document.getElementById("btnAI").disabled=false;aiAbort=null;
  });
}

function setCoin(idx,val){var c=document.getElementById("c"+idx);c.className="coin "+(val===3?"y3":"y2");c.textContent=val===3?"●":"○"}

function updateYao(idx,yy,ch){var r=yaoRows[idx],s=r.querySelector(".sym");if(yy){s.textContent=ch?"━━━━━━━○":"━━━━━━━";s.style.color=ch?"var(--dong)":"var(--yang)"}else{s.textContent=ch?"━━ ━━×":"━━ ━━";s.style.color=ch?"var(--dong)":"var(--yin)"}}

function castYao(){
  if(busy||nextYao>=6)return;
  busy=true;
  var btn=document.getElementById("btnCast");btn.disabled=true;
  document.getElementById("btnCancel").disabled=false;
  var idx=nextYao;
  document.getElementById("coinStatus").textContent="第"+(idx+1)+"爻（"+YAO_NAMES[idx]+"爻）掷铜钱中...";
  document.getElementById("coinResult").textContent="";
  var total=[6,7,8,9][Math.floor(Math.random()*4)];
  var csVals=[],numThrees=total-6;
  for(var i=0;i<3;i++)csVals.push(i<numThrees?3:2);
  for(var i=2;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=csVals[i];csVals[i]=csVals[j];csVals[j]=tmp}
  var frames=[];
  for(var f=0;f<8;f++){frames.push([Math.random()<.5?2:3,Math.random()<.5?2:3,Math.random()<.5?2:3])}
  frames.push(csVals);
  var fi=0;
  function step(){
    if(fi>=frames.length){
      for(var ci=0;ci<3;ci++)setCoin(ci,csVals[ci]);
      var r=CN[total];
      document.getElementById("coinResult").innerHTML=r.n+(r.c?' <span style="color:#ff8844">(变爻)</span>':"");
      document.getElementById("coinResult").style.color=r.c?"var(--dong)":"#88ff88";
      results.push(total);
      updateYao(idx,CN[total].yy,CN[total].c);
      progDots[idx].classList.add("done");
      busy=false;
      if(results.length===6){btn.textContent="查看结果";btn.disabled=false;nextYao=6;showResult()}
      else{nextYao++;btn.textContent="掷一爻（"+YAO_NAMES[nextYao]+"爻）";btn.disabled=false;document.getElementById("coinStatus").textContent="第"+(nextYao+1)+"爻就绪"}
      return;
    }
    var f=frames[fi];for(var ci=0;ci<3;ci++)setCoin(ci,f[ci]);fi++;
    setTimeout(step,fi>=frames.length?200:100);
  }
  step();
}

  var bs=BAGUA[ug]||{},bx2=BAGUA[lg]||{};

  document.getElementById("tyInfo").textContent="梅花："+ty;

  document.getElementById("analysisBox").textContent=doAnalyze(g);

  // Save to history
