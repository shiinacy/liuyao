<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a16">
<title>奇门遁甲 · 简版排盘</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0a16;--card:#111125;--card2:#0e0e1e;--gold:#ffd700;--gold2:#b8960f;--dim:#555577;--dim2:#333355;--yang:#44aaff;--yin:#6688ff;--dong:#ffdd00;--green:#44ff44;--red:#ff4444;--text:#ccccdd;--text2:#9999bb;--sidebar-w:min(320px,85vw)}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:520px;margin:0 auto;overflow-x:hidden;padding-left:env(safe-area-inset-left,0px);padding-right:env(safe-area-inset-right,0px)}
.header{text-align:center;padding:28px 16px 12px;background:linear-gradient(180deg,#151530,var(--bg));position:relative}
.header h1{font-size:22px;color:var(--gold);text-shadow:0 0 20px rgba(255,215,0,.3);letter-spacing:4px}
.header p{font-size:10px;color:var(--dim);margin-top:4px;letter-spacing:2px}
.header p .label-tag{display:inline-block;background:#2a2a55;color:#aaa;padding:1px 6px;border-radius:4px;font-size:9px;margin-left:4px;vertical-align:middle}
.back-btn{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text2);text-decoration:none;font-size:13px;padding:6px 10px;border-radius:8px;background:rgba(255,255,255,.04);border:1px solid #1a1a35;transition:all .15s}
.back-btn:active{background:rgba(255,255,255,.1)}
.gear-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:20px;cursor:pointer;padding:6px 8px;border:none;background:none;transition:all .15s}
.gear-btn:active{transform:translateY(-50%) rotate(45deg)}
.card{background:var(--card);border-radius:12px;padding:14px;margin:8px 12px;border:1px solid #1a1a35}
.mode-switch{display:flex;gap:6px;padding:0 0 8px}
.mode-btn{flex:1;border:1px solid #2a2a44;border-radius:8px;padding:10px;background:var(--card2);color:var(--text2);font-size:13px;cursor:pointer;text-align:center;transition:all .15s}
.mode-btn.active{border-color:var(--gold);color:var(--gold);background:#1a1a35}
.mode-btn:hover{border-color:var(--gold2);color:var(--text)}
.mode-btn:active{transform:scale(.97)}
.datetime-row{display:none;padding:0 0 8px;gap:6px}
.datetime-row.show{display:flex}
.datetime-row input{flex:1;background:#15152a;border:1px solid #2a2a44;border-radius:8px;padding:10px 12px;color:#fff;font-size:13px;outline:none}
.datetime-row input:focus{border-color:var(--gold)}
.btns{display:flex;justify-content:center;gap:10px;padding:6px 0 0}
.btn{border:none;border-radius:10px;padding:12px 20px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;letter-spacing:1px}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.btn:active{transform:scale(.96)}
.btn-cast{background:linear-gradient(135deg,#cc3333,#aa2222);color:#fff;flex:1}
.btn-reset{background:#333355;color:#aaa;flex:.4}
.ganzhi-bar{display:none;text-align:center;padding:6px 12px}
.ganzhi-bar.show{display:block}
.ganzhi-bar .gz-title{font-size:11px;color:var(--dim);margin-bottom:4px}
.ganzhi-bar .gz-vals{display:flex;justify-content:center;gap:6px;flex-wrap:wrap}
.ganzhi-bar .gz-item{background:var(--card2);border-radius:6px;padding:4px 10px;font-size:12px;color:var(--yang);border:1px solid #1a1a35}
.ganzhi-bar .gz-item span{color:var(--dim);font-size:10px;margin-right:3px}
.chart-info{display:none;padding:4px 12px 8px}.chart-info.show{display:block}
.chart-info .ci-row{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.chart-info .ci-tag{background:var(--card2);border:1px solid #1a1a35;border-radius:6px;padding:4px 10px;font-size:11px;color:var(--text2)}
.chart-info .ci-tag b{color:var(--gold)}
.grid-wrap{display:none;padding:4px 12px 8px}.grid-wrap.show{display:block}
.qimen-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.fade-up{opacity:0;transform:translateY(14px);animation:fadeUp .45s ease forwards} .palace-cell{background:var(--card);border-radius:10px;padding:8px 6px;border:1px solid #1a1a35;text-align:center;min-height:100px;display:flex;flex-direction:column;justify-content:center;gap:2px;position:relative;transition:border-color .2s,box-shadow .2s}
.palace-cell.highlight{border-color:var(--gold);box-shadow:0 0 8px rgba(255,215,0,.15)}
.palace-cell.center-cell{background:#13132a}
.palace-cell .p-name{font-size:12px;font-weight:700;letter-spacing:1px}
.palace-cell .p-stems{font-size:14px;font-weight:700;margin:1px 0;letter-spacing:2px}
.palace-cell .p-star{font-size:11px;color:var(--yang)}
.palace-cell .p-door{font-size:11px}
.palace-cell .p-god{font-size:10px;color:var(--dim)}
.palace-cell .p-elem{position:absolute;top:4px;right:6px;font-size:9px;opacity:.6}
.palace-cell .p-kong{position:absolute;top:3px;left:5px;font-size:8px;color:var(--red);font-weight:700}
.el-water .p-name{color:#44aaff}.el-water{border-color:#1a2a44}
.el-wood .p-name{color:#44ff44}.el-wood{border-color:#1a3a24}
.el-fire .p-name{color:#ff4444}.el-fire{border-color:#3a1a1a}
.el-earth .p-name{color:#dd8800}.el-earth{border-color:#2a2a14}
.el-metal .p-name{color:var(--gold)}.el-metal{border-color:#2a2a14}
.el-center .p-name{color:#bb88ff}.el-center{border-color:#2a1a35}
.door-gi{color:var(--green)}.door-xiong{color:var(--red)}
.star-gi{color:var(--green)}.star-xiong{color:var(--red)}
.result-section{display:none;padding:4px 12px 8px}.result-section.show{display:block}
.section-title{font-size:14px;font-weight:700;color:var(--gold);text-align:center;padding:6px 0 8px}
.info-card{background:var(--card);border-radius:10px;padding:10px 12px;margin-bottom:8px;border:1px solid #1a1a35}
.info-card .ic-title{font-size:12px;color:var(--gold);font-weight:700;margin-bottom:4px}
.info-card .ic-body{font-size:12px;line-height:1.8;color:var(--text2)}
.interp-card{background:var(--card);border-radius:12px;padding:14px;margin:8px 12px 12px;border:1px solid #1a1a35}
.interp-card .interp-title{font-size:14px;font-weight:700;color:var(--gold);text-align:center;padding-bottom:8px}
.interp-card .interp-body{font-size:12px;line-height:1.8;color:#bbbbcc;max-height:50vh;overflow-y:auto;white-space:pre-wrap}
.copy-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px}
.btn-copy{background:#2255aa;color:#fff;border:none;border-radius:8px;padding:10px 16px;font-size:13px;cursor:pointer}
.btn-copy:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(34,85,170,.3)}
.btn-copy:active{background:#1a4488}
.copy-hint{font-size:11px;color:var(--green);min-height:16px;text-align:center}
.footer{text-align:center;padding:12px;font-size:10px;color:#333355}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:100;opacity:0;transition:opacity .4s}
.sidebar-overlay.show{display:block;opacity:1}
.sidebar{position:fixed;top:0;right:0;width:var(--sidebar-w);height:100%;background:linear-gradient(180deg,rgba(14,14,32,.98),rgba(10,10,22,.99));z-index:101;transform:translateX(100%);transition:transform .4s cubic-bezier(.22,1,.36,1);padding:20px 16px;overflow-y:auto;border-left:1px solid rgba(255,215,0,.1);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:-4px 0 30px rgba(0,0,0,.5)}
.sidebar.show{transform:translateX(0)}
.sidebar h3{font-size:16px;color:var(--gold);margin-bottom:14px;padding-bottom:12px;display:flex;align-items:center;justify-content:space-between;position:relative}
.sidebar h3 .close-x{cursor:pointer;font-size:20px;color:var(--dim);background:none;border:none;padding:0 4px}
.sb-group{margin-bottom:14px}
.sb-group label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px}
.sb-group input{width:100%;background:#15152a;border:1px solid #2a2a44;border-radius:8px;padding:8px 10px;color:#fff;font-size:13px;outline:none}
.sb-group input:focus{border-color:var(--gold)}
.btn-test{background:#333355;color:var(--text);border:none;border-radius:8px;padding:8px 16px;font-size:12px;cursor:pointer;margin-top:6px}
.btn-test:active{background:#444466}
.test-result{font-size:11px;color:var(--dim);margin-top:4px;min-height:16px}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .3s ease}

/* === Animation Enhancements === */

/* 1. Palace cell stagger animation */
.palace-cell{opacity:0;animation:palaceEnter .4s ease forwards}
.palace-cell:nth-child(1){animation-delay:.05s}
.palace-cell:nth-child(2){animation-delay:.1s}
.palace-cell:nth-child(3){animation-delay:.15s}
.palace-cell:nth-child(4){animation-delay:.2s}
.palace-cell:nth-child(5){animation-delay:.25s}
.palace-cell:nth-child(6){animation-delay:.3s}
.palace-cell:nth-child(7){animation-delay:.35s}
.palace-cell:nth-child(8){animation-delay:.4s}
.palace-cell:nth-child(9){animation-delay:.45s}
@keyframes palaceEnter{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}

/* 2. Body background glow */
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 50% 30%,rgba(255,215,0,.03) 0%,transparent 50%),radial-gradient(circle at 30% 70%,rgba(68,170,255,.03) 0%,transparent 50%);pointer-events:none;z-index:0}

/* 3. Card stagger animation */
.card,.ganzhi-bar,.chart-info,.grid-wrap,.result-section,.interp-card{opacity:0;transform:translateY(10px);animation:fadeUp .4s ease forwards}

/* 4. Highlight pulse on highlighted palace cell */
.palace-cell.highlight{animation:highlightPulse 2s ease infinite alternate}
@keyframes highlightPulse{from{box-shadow:0 0 8px rgba(255,215,0,.15)}to{box-shadow:0 0 20px rgba(255,215,0,.3)}}

/* 5. Hover effect on palace cells */
.palace-cell:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.hist-btn{position:absolute;right:48px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:18px;cursor:pointer;padding:6px 8px;border:none;background:none;transition:all .15s}
.hist-btn:active{color:var(--gold)}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-cursor{display:inline-block;width:2px;height:1em;background:var(--gold);animation:blink .6s step-end infinite;vertical-align:text-bottom;margin-left:2px}
@keyframes blink{50%{opacity:0}}
.sidebar::before{content:"";position:absolute;top:0;left:0;width:1px;height:100%;background:linear-gradient(180deg,transparent,rgba(255,215,0,.4),rgba(68,170,255,.2),transparent);animation:sidebarGlow 3s ease-in-out infinite}
@keyframes sidebarGlow{0%,100%{opacity:.4}50%{opacity:1}}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-track{background:transparent}
.sidebar::-webkit-scrollbar-thumb{background:rgba(255,215,0,.2);border-radius:3px}
.sidebar::-webkit-scrollbar-thumb:hover{background:rgba(255,215,0,.4)}


/* ===== 炫酷特效 ===== */
/* 星空背景 */
body::after {
  content: '';
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background:
    radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,.6), transparent),
    radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,.4), transparent),
    radial-gradient(1px 1px at 50% 10%, rgba(255,215,0,.5), transparent),
    radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,.3), transparent),
    radial-gradient(1px 1px at 90% 40%, rgba(255,215,0,.4), transparent),
    radial-gradient(1px 1px at 15% 85%, rgba(68,170,255,.4), transparent),
    radial-gradient(1px 1px at 45% 45%, rgba(255,255,255,.5), transparent),
    radial-gradient(1px 1px at 65% 25%, rgba(255,215,0,.3), transparent),
    radial-gradient(1px 1px at 85% 65%, rgba(68,170,255,.3), transparent),
    radial-gradient(1px 1px at 25% 35%, rgba(255,255,255,.4), transparent),
    radial-gradient(1.5px 1.5px at 55% 75%, rgba(255,215,0,.5), transparent),
    radial-gradient(1px 1px at 5% 50%, rgba(255,255,255,.3), transparent),
    radial-gradient(1px 1px at 75% 15%, rgba(68,170,255,.4), transparent),
    radial-gradient(1px 1px at 35% 90%, rgba(255,215,0,.3), transparent),
    radial-gradient(1.5px 1.5px at 95% 5%, rgba(255,255,255,.5), transparent);
  pointer-events: none;
  z-index: 0;
  animation: starTwinkle 4s ease-in-out infinite alternate;
}
@keyframes starTwinkle {
  0% { opacity: .5; }
  50% { opacity: .9; }
  100% { opacity: .6; }
}

/* 流星效果 */
@keyframes shootingStar {
  0% { transform: translate(0, 0) rotate(-45deg); opacity: 1; }
  70% { opacity: 1; }
  100% { transform: translate(300px, 300px) rotate(-45deg); opacity: 0; }
}

/* 标题呼吸发光 */
.header h1 {
  animation: titleGlow 3s ease-in-out infinite;
}
@keyframes titleGlow {
  0%, 100% { text-shadow: 0 0 20px rgba(255,215,0,.2), 0 0 40px rgba(255,215,0,.05); }
  50% { text-shadow: 0 0 30px rgba(255,215,0,.4), 0 0 60px rgba(255,215,0,.1), 0 0 80px rgba(255,215,0,.05); }
}
/* 卡片悬浮光效 */
.card {
  position: relative;
  overflow: hidden;
  transition: transform .3s, box-shadow .3s, border-color .3s;
}
.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(0,0,0,.3), 0 0 30px rgba(255,215,0,.05);
  border-color: rgba(255,215,0,.15);
}
.card::after {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: linear-gradient(45deg, transparent 40%, rgba(255,215,0,.02) 50%, transparent 60%);
  transform: translateX(-100%);
  transition: transform .8s;
  pointer-events: none;
}
.card:hover::after {
  transform: translateX(100%);
}
/* 按钮脉冲 */
.btn-cast {
  position: relative;
  overflow: hidden;
}
.btn-cast::before {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  width: 0; height: 0;
  background: rgba(255,255,255,.15);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  transition: width .5s, height .5s;
}
.btn-cast:active::before {
  width: 300px; height: 300px;
}

#particleCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
</style>
</head>
<body>
<!-- History panel -->
<div class="sidebar-overlay" id="historyOverlay" onclick="closeHistory()"></div>
<div class="sidebar" id="historyPanel">
  <h3>🕘 历史记录 <button class="close-x" onclick="closeHistory()">&times;</button></h3>

</div>

</div>

var GOD_RING_YANG=["值符","螣蛇","太阴","六合","白虎","玄武","九地","九天"];
var GOD_RING_YIN=["值符","九天","九地","玄武","白虎","六合","太阴","螣蛇"];
var EARTH_STEM_YANG={1:"戊",8:"己",3:"庚",4:"辛",9:"壬",2:"癸",7:"丁",6:"丙",5:"乙"};

var JU_TABLE={"阳遁":{"冬至":{"上元":1,"中元":7,"下元":4},"小寒":{"上元":2,"中元":8,"下元":5},"大寒":{"上元":3,"中元":9,"下元":6},"立春":{"上元":8,"中元":5,"下元":2},"雨水":{"上元":9,"中元":6,"下元":3},"惊蛰":{"上元":1,"中元":7,"下元":4},"春分":{"上元":3,"中元":9,"下元":6},"清明":{"上元":4,"中元":1,"下元":7},"谷雨":{"上元":5,"中元":2,"下元":8},"立夏":{"上元":4,"中元":1,"下元":7},"小满":{"上元":5,"中元":2,"下元":8},"芒种":{"上元":6,"中元":3,"下元":9}},"阴遁":{"夏至":{"上元":9,"中元":3,"下元":6},"小暑":{"上元":8,"中元":2,"下元":5},"大暑":{"上元":7,"中元":1,"下元":4},"立秋":{"上元":2,"中元":5,"下元":8},"处暑":{"上元":1,"中元":4,"下元":7},"白露":{"上元":9,"中元":3,"下元":6},"秋分":{"上元":7,"中元":1,"下元":4},"寒露":{"上元":6,"中元":9,"下元":3},"霜降":{"上元":5,"中元":8,"下元":2},"立冬":{"上元":6,"中元":9,"下元":3},"小雪":{"上元":5,"中元":8,"下元":2},"大雪":{"上元":4,"中元":7,"下元":1}}};

var JIEQI_DATES=[[0,5,"小寒"],[0,20,"大寒"],[1,4,"立春"],[1,19,"雨水"],[2,5,"惊蛰"],[2,20,"春分"],[3,4,"清明"],[3,19,"谷雨"],[4,5,"立夏"],[4,20,"小满"],[5,5,"芒种"],[5,21,"夏至"],[6,7,"小暑"],[6,22,"大暑"],[7,7,"立秋"],[7,22,"处暑"],[8,7,"白露"],[8,22,"秋分"],[9,8,"寒露"],[9,23,"霜降"],[10,7,"立冬"],[10,22,"小雪"],[11,7,"大雪"],[11,22,"冬至"]];
JIEQI_DATES.sort(function(a,b){return a[0]*100+a[1]-b[0]*100-b[1]});

function approxJieqi(year,month,day){
  var m0=month-1;var best=null;
  for(var i=0;i<JIEQI_DATES.length;i++){var j=JIEQI_DATES[i];if(j[0]<m0||(j[0]===m0&&j[1]<=day))best=j[2]}
  return best||"大雪"
}
function getNextJieqi(name){
  var order=["冬至","小寒","大寒","立春","雨水","惊蛰","春分","清明","谷雨","立夏","小满","芒种","夏至","小暑","大暑","立秋","处暑","白露","秋分","寒露","霜降","立冬","小雪","大雪"];
  var i=order.indexOf(name);return i<0?"冬至":order[(i+1)%24]
}
function yearGanZhi(y){return TIANGAN[((y-4)%10+10)%10]+DIZHI[((y-4)%12+12)%12]}
function monthGanZhi(y,m,d){
  var jq=approxJieqi(y,m,d);
  var mm={"小寒":11,"大寒":12,"立春":1,"雨水":1,"惊蛰":2,"春分":2,"清明":3,"谷雨":3,"立夏":4,"小满":4,"芒种":5,"夏至":5,"小暑":6,"大暑":6,"立秋":7,"处暑":7,"白露":8,"秋分":8,"寒露":9,"霜降":9,"立冬":10,"小雪":10,"大雪":11,"冬至":11};
  var lm=mm[jq]||1;
  var ysi=((y-4)%10+10)%10;
  var msb=[2,4,6,8,0,2,4,6,8,0];
  var ms=(msb[ysi]+lm-1)%10;var mz=(lm+1)%12;
  return TIANGAN[ms]+DIZHI[mz]
}
function dayGanZhi(y,m,d){
  var ref=new Date(1900,0,1);var tgt=new Date(y,m-1,d);
  var diff=Math.floor((tgt-ref)/864e5);var idx=((diff%60)+60)%60;idx=(idx+36)%60;
  return JIAZI[idx]
}
function hourGanZhi(dgz,h){
  var hzI=h===23?0:Math.floor((h+1)/2);
  var dsI=TIANGAN.indexOf(dgz.charAt(0));
  var hsI=((dsI%5)*2+hzI)%10;
  return TIANGAN[hsI]+DIZHI[hzI]
}
function buildChart(y,m,d,h){
  var R={};
  R.gzYear=yearGanZhi(y);R.gzMonth=monthGanZhi(y,m,d);R.gzDay=dayGanZhi(y,m,d);R.gzTime=hourGanZhi(R.gzDay,h);
  var jq=approxJieqi(y,m,d);R.jieqi=jq;R.nextJieqi=getNextJieqi(jq);
  R.dunType=YANG_TERMS_SET[jq]?"阳遁":"阴遁";
  var di60=JIAZI.indexOf(R.gzDay);if(di60<0)di60=0;
  var yi=Math.floor(di60/5)%3;R.yuan=["上元","中元","下元"][yi];
  R.juNumber=JU_TABLE[R.dunType][jq][R.yuan];
  var ti60=JIAZI.indexOf(R.gzTime);var xsi=Math.floor(ti60/10)*10;
  R.xunshou=JIAZI[xsi];
  R.hiddenYi=XUNSHOU_TO_HIDDEN[R.xunshou]||"戊";
  var ts=R.gzTime.charAt(0);R.visibleTimeStem=ts==="甲"?R.hiddenYi:ts;
  var ki1=(xsi+8)%12,ki2=(xsi+9)%12;
  R.kongwang=[DIZHI[ki1],DIZHI[ki2]];
  var kp=[];
  var kp1=BRANCH_TO_PALACE[DIZHI[ki1]],kp2=BRANCH_TO_PALACE[DIZHI[ki2]];
  if(kp1&&kp.indexOf(kp1)<0)kp.push(kp1);if(kp2&&kp.indexOf(kp2)<0)kp.push(kp2);
  R.kongwangPalaces=kp;
  var ep=R.dunType==="阳遁"?Object.assign({},EARTH_STEM_YANG):Object.assign({},EARTH_STEM_YIN);
  function findSP(p,s){for(var i=1;i<=9;i++)if(p[i]===s)return i;return 5}
  function hosted(p){return p===5?2:p}
  var xrp=findSP(ep,R.hiddenYi),trp=findSP(ep,R.visibleTimeStem);
  R.xunPalace=hosted(xrp);R.timePalace=hosted(trp);
  function rotTo(arr,v){var i=arr.indexOf(v);if(i<0)i=0;return arr.slice(i).concat(arr.slice(0,i))}
  var po,so,do2,go,oe;
  if(R.dunType==="阳遁"){
    po=rotTo(ROTATION_RING,R.timePalace);
    var si=ROTATION_RING.indexOf(R.xunPalace);
    so=rotTo(STAR_RING,STAR_RING[si>=0?si:0]);
    do2=rotTo(DOOR_RING,DOOR_RING[si>=0?si:0]);
    go=GOD_RING_YANG.slice();oe=[];
    for(var i=0;i<ROTATION_RING.length;i++)oe.push(ep[ROTATION_RING[i]])
  }else{
    var rr=ROTATION_RING.slice().reverse(),rs=STAR_RING.slice().reverse(),rd=DOOR_RING.slice().reverse();
    po=rotTo(rr,R.timePalace);
    var si2=ROTATION_RING.indexOf(R.xunPalace);
    so=rotTo(rs,STAR_RING[si2>=0?si2:0]);
    do2=rotTo(rd,DOOR_RING[si2>=0?si2:0]);
    go=GOD_RING_YIN.slice();oe=[];
    for(var i=0;i<rr.length;i++)oe.push(ep[rr[i]])
  }
  var sko=rotTo(oe,R.hiddenYi);
  if(xrp===5)sko=rotTo(oe,ep[R.xunPalace]);
  var sm={},dm={},gm={},skm={};
  for(var i=0;i<po.length;i++){sm[po[i]]=so[i];dm[po[i]]=do2[i];gm[po[i]]=go[i];skm[po[i]]=sko[i]}
  R.zhifu={star:sm[R.timePalace],palace:R.timePalace};
  R.zhishi={door:dm[R.timePalace],palace:R.timePalace};
  var pals=[];
  for(var p=1;p<=9;p++){
    pals.push({palace:p,name:PALACE_NAMES[p],direction:PALACE_DIR[p],element:PALACE_ELEM[p],
      earthStem:ep[p]||"",skyStem:skm[p]||"",
      star:p===5?"天禽":(sm[p]||""),door:p===5?null:(dm[p]||null),god:p===5?null:(gm[p]||null),
      isCenter:p===5,hostsCenter:p===2})
  }
  R.palaces=pals;R.warnings=[];
  if(xrp===5||trp===5)R.warnings.push("中宫相关判断一律寄坤处理。");
  return R
}

function renderGrid(c){
  var g=document.getElementById("qimenGrid");g.innerHTML="";
  for(var gi=0;gi<GRID_ORDER.length;gi++){
    var pN=GRID_ORDER[gi],pal=c.palaces[pN-1];

    var ec=pal.isCenter?"el-center":(ELEM_CLASS[pal.element]||"");
    cell.className="palace-cell "+ec;
    if(pN===c.timePalace)cell.className+=" highlight";
    var kh=c.kongwangPalaces.indexOf(pN)>=0?'<div class="p-kong">空</div>':'';
    var ei='<div class="p-elem">'+pal.element+'</div>';
    var nh='<div class="p-name">'+pal.name+'</div>';
    var sh='<div class="p-stems">'+(pal.skyStem||"")+(pal.earthStem||"")+'</div>';
    var si=QIMEN_DATA["九星"][pal.star]||{};
    var sc=si["吉凶"]==="吉"?"star-gi":"star-xiong";
    var sth='<div class="p-star '+sc+'">'+(pal.star||"")+'</div>';
    var di=pal.door?(QIMEN_DATA["八门"][pal.door]||{}):{};

  L.push("【用神落宫】");
  L.push("时干 "+c.visibleTimeStem+" 落"+tp.name+"（"+tp.direction+"）");
  L.push("天盘"+tp.skyStem+"、地盘"+tp.earthStem);
  L.push("九星："+tp.star+"（"+((QIMEN_DATA["九星"][tp.star]||{}).含义||"")+"）");
  if(tp.door)L.push("八门："+tp.door+"（"+((QIMEN_DATA["八门"][tp.door]||{}).含义||"")+"）");
  if(tp.god)L.push("八神："+tp.god+"（"+((QIMEN_DATA["八神"][tp.god]||{}).含义||"")+"）");
  L.push("");L.push("【门星吉凶】");
  var jc=0,xc=0;
  for(var i=0;i<c.palaces.length;i++){var p=c.palaces[i];if(p.isCenter)continue;
    var si=QIMEN_DATA["九星"][p.star],di=p.door?QIMEN_DATA["八门"][p.door]:null;
    if(si&&si["吉凶"]==="吉")jc++;else if(si)xc++;
    if(di&&di["属性"]==="吉")jc++;else if(di)xc++}
  L.push("吉门吉星共 "+jc+" 位，凶门凶星共 "+xc+" 位");
  L.push("");L.push("【综合判断】");
  var tsI=QIMEN_DATA["九星"][tp.star]||{};var tdI=tp.door?(QIMEN_DATA["八门"][tp.door]||{}):{};
  var sJ=tsI["吉凶"]==="吉",dJ=tdI["属性"]==="吉";
  if(sJ&&dJ)L.push("用神落宫门星皆吉，主事体顺利，可积极行动。");
  else if(!sJ&&!dJ)L.push("用神落宫门星皆凶，主事有阻碍，宜谨慎守成。");
  else L.push("用神落宫门星吉凶参半，事有反复，需结合具体情况把握时机。");
  L.push("");L.push("【方位建议】");
  var jd=[];
  for(var i=0;i<c.palaces.length;i++){var p2=c.palaces[i];if(p2.isCenter)continue;
    var di2=p2.door?QIMEN_DATA["八门"][p2.door]:null;
    if(di2&&di2["属性"]==="吉")jd.push(p2.direction+"（"+p2.door+"）")}
  if(jd.length>0)L.push("吉门方位："+jd.join("、"));else L.push("当前盘面吉门较少，宜守不宜进。");
  L.push("");L.push("💡 以上为简版排盘自动解读，仅供参考。正式解盘请结合具体事项与用神分析。");
  document.getElementById("interpBody").textContent=L.join("\n");
  document.getElementById("interpCard").style.display="block"
}

var AI_SYS="你是一位经验丰富的奇门遁甲师傅，说话接地气，像朋友间聊天。请根据以下奇门遁甲排盘结果给出解读。\n分析思路：先说这个盘整体格局怎么样，再看用神落在哪个宫、八门开门还是杜门、九星旺不旺、八神提示什么，最后告诉对方什么方位有利、什么时间段适合行动。\n要求：语言通俗好懂，别用太多专业术语。结论要明确，不好的地方委婉提醒并给出化解思路，好的地方鼓励对方把握机会。";

function getChartText(){
  if(!currentChart)return"";var c=currentChart,t=[];
  t.push("【排盘结果】");t.push("干支："+c.gzYear+"年 "+c.gzMonth+"月 "+c.gzDay+"日 "+c.gzTime+"时");
  t.push(c.dunType+" "+c.juNumber+"局（"+c.yuan+"）");t.push("节气："+c.jieqi);
  t.push("旬首："+c.xunshou+"　旬空："+c.kongwang.join(" "));
  t.push("值符："+c.zhifu.star+"（"+PALACE_NAMES[c.zhifu.palace]+"）");
  t.push("值使："+c.zhishi.door+"（"+PALACE_NAMES[c.zhishi.palace]+"）");
  t.push("");t.push("【九宫排盘】");
  var gd=[4,9,2,3,5,7,8,1,6];
  for(var r=0;r<3;r++){for(var cc=0;cc<3;cc++){var pN=gd[r*3+cc],pal=c.palaces[pN-1];
    var pts=[pal.name];if(pal.skyStem)pts.push("天"+pal.skyStem);if(pal.earthStem)pts.push("地"+pal.earthStem);
    if(pal.star)pts.push(pal.star);if(pal.door)pts.push(pal.door);if(pal.god)pts.push(pal.god);
    t.push(pts.join(" | "))}t.push("---")}
  t.push("时干（用神）落"+PALACE_NAMES[c.timePalace]);return t.join("\n")
}
function copyForAI(){
  var text=getChartText();if(!text){document.getElementById("copyHint").textContent="请先排盘";return}
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(function(){document.getElementById("copyHint").textContent="已复制！"}).catch(function(){fbc(text)})}
  else fbc(text)
}
function fbc(text){var ta=document.createElement("textarea");ta.value=text;ta.style.cssText="position:fixed;left:-9999px";document.body.appendChild(ta);ta.select();try{document.execCommand("copy");document.getElementById("copyHint").textContent="已复制！"}catch(e){document.getElementById("copyHint").textContent="复制失败"}document.body.removeChild(ta)}

async function aiInterpret(){
  var url=document.getElementById("sbApiUrl").value.trim(),key=document.getElementById("sbApiKey").value.trim(),mdl=document.getElementById("sbModel").value.trim()||"gpt-4o";
  if(!url||!key){document.getElementById("copyHint").textContent="请先在设置中填写API地址和Key";openSidebar();return}
  var ct=getChartText();if(!ct){document.getElementById("copyHint").textContent="请先排盘";return}
  document.getElementById("aiCard").style.display="block";document.getElementById("aiBody").innerHTML='<div style="text-align:center;padding:20px;color:var(--dim)"><span style="display:inline-block;width:18px;height:18px;border:2px solid var(--dim);border-top:2px solid var(--gold);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:8px"></span>AI 正在解读，请稍候…</div>';
  document.getElementById("copyHint").textContent="";
  var aiAbortCtrl=new AbortController();
  var sysPrompt=AI_SYS;
  var apiUrl=url.replace(/\/+$/,"");if(!apiUrl.endsWith("/chat/completions"))apiUrl+="/chat/completions";fetch(apiUrl,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},body:JSON.stringify({model:mdl,messages:[{role:"system",content:sysPrompt},{role:"user",content:"请为以下奇门遁甲排盘结果进行解读：\n\n"+ct}],stream:true,max_tokens:2000,temperature:0.7}),signal:aiAbortCtrl.signal}).then(function(resp){
    if(!resp.ok){resp.text().then(function(errText){document.getElementById("aiBody").innerHTML='<div style="color:var(--red);text-align:center;padding:12px">请求失败('+resp.status+'): '+errText.substring(0,200)+'</div>'});return}
    var reader=resp.body.getReader();var decoder=new TextDecoder();var buffer='';var fullText='';
    var box=document.getElementById("aiBody");box.innerHTML='<span class="ai-cursor"></span>';
    function readChunk(){reader.read().then(function(result){
      if(result.done){box.innerHTML=fullText;document.getElementById("copyHint").textContent="AI解读完成！";return}
      buffer+=decoder.decode(result.value,{stream:true});
      var lines=buffer.split('\n');buffer=lines.pop()||'';
      for(var i=0;i<lines.length;i++){var line=lines[i].trim();if(!line||line==='data: [DONE]')continue;if(line.indexOf('data: ')===0){try{var json=JSON.parse(line.substring(6));var delta=json.choices&&json.choices[0]&&json.choices[0].delta;if(delta&&delta.content){fullText+=delta.content;box.innerHTML=fullText+'<span class="ai-cursor"></span>';box.scrollTop=box.scrollHeight;}}catch(e){}}}
      readChunk();
    }).catch(function(e){if(e.name!=='AbortError'){box.innerHTML=fullText+'<div style="color:var(--red);font-size:12px;text-align:center;padding:8px">读取中断: '+e.message+'</div>'}});}
    readChunk();
  }).catch(function(e){if(e.name!=='AbortError'){document.getElementById("aiBody").innerHTML='<div style="color:var(--red);text-align:center;padding:12px">请求失败: '+e.message+'</div>'}});
}
