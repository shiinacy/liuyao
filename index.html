<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a16">
<title>周易六爻占卜</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0a16;--card:#111125;--card2:#0e0e1e;--gold:#ffd700;--gold2:#b8960f;--dim:#555577;--dim2:#333355;--yang:#44aaff;--yin:#6688ff;--dong:#ffdd00;--green:#44ff44;--red:#ff4444;--text:#ccccdd;--text2:#9999bb}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:520px;margin:0 auto;overflow-x:hidden}
.header{text-align:center;padding:28px 16px 12px;background:linear-gradient(180deg,#151530,var(--bg))}
.header h1{font-size:22px;color:var(--gold);text-shadow:0 0 20px rgba(255,215,0,.3);letter-spacing:4px}
.header p{font-size:10px;color:var(--dim);margin-top:4px;letter-spacing:2px}
.card{background:var(--card);border-radius:12px;padding:14px;margin:8px 12px;border:1px solid #1a1a35}
.input-row{padding:8px 12px}
.input-row input{width:100%;background:#15152a;border:1px solid #2a2a44;border-radius:8px;padding:10px 12px;color:#fff;font-size:14px;outline:none}
.input-row input:focus{border-color:var(--gold)}
.input-row input::placeholder{color:#444466;font-size:13px}
.coin-area{text-align:center}
.coins{display:flex;justify-content:center;gap:16px;margin:8px 0}
.coin{width:56px;height:56px;border-radius:50%;border:2px solid var(--gold2);background:#1e1e36;display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--gold);transition:all .12s}
.coin.y3{background:#332a10;border-color:#ffaa00;color:#ffaa00;box-shadow:0 0 12px rgba(255,170,0,.4)}
.coin.y2{background:#1e2a44;border-color:#6688ff;color:#6688ff;box-shadow:0 0 12px rgba(102,136,255,.3)}
.coin-status{font-size:12px;color:var(--dim);min-height:16px}
.coin-result{font-size:15px;font-weight:700;color:var(--gold);min-height:20px;margin-top:2px}
.btns{display:flex;justify-content:center;gap:10px;padding:6px 12px 10px}
.btn{border:none;border-radius:10px;padding:12px 20px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;letter-spacing:1px}
.btn:active{transform:scale(.96)}
.btn-cast{background:linear-gradient(135deg,#cc3333,#aa2222);color:#fff;flex:1}
.btn-cast:disabled{background:#444455;color:#666;cursor:default}
.btn-cancel{background:#333355;color:#aaa;flex:.6}
.btn-cancel:disabled{opacity:.4;cursor:default}
.progress{display:flex;justify-content:center;gap:4px;padding:4px 12px}
.prog-dot{width:38px;text-align:center;border-radius:6px;padding:4px 0;font-size:11px;background:var(--card2);color:var(--dim);transition:all .2s}
.prog-dot.done{background:#226644;color:#fff}
.yao-table{padding:4px 12px}
.yao-row{display:flex;align-items:center;padding:6px 10px;border-radius:5px;margin-bottom:1px;background:var(--card2);gap:4px}
.yao-row .pos{width:24px;font-size:11px;color:var(--dim)}
.yao-row .sym{flex:1;font-size:13px;color:var(--dim2);font-family:monospace;letter-spacing:1px}
.yao-row .gz{width:36px;font-size:10px;color:#4488ff;text-align:center}
.yao-row .lq{width:32px;font-size:10px;color:#44ff44;text-align:center}
.yao-row .tag{width:40px;font-size:9px;color:var(--dong);text-align:center}
.result-card{text-align:center;display:none}.result-card.show{display:block}
.gua-name{font-size:20px;font-weight:700;color:var(--gold)}
.fortune{font-size:16px;font-weight:700;margin-top:2px}
.wx-info{font-size:11px;color:#aaa;margin-top:2px}
.ty-info{font-size:11px;color:#4488ff;margin-top:1px}
.analysis-card{display:none;padding-bottom:20px}.analysis-card.show{display:block}
.analysis-title{text-align:center;font-size:15px;font-weight:700;color:var(--gold);padding-bottom:8px}
.analysis-box{background:#0c0c1a;border-radius:8px;padding:12px;font-size:12px;line-height:1.8;color:#bbbbcc;max-height:50vh;overflow-y:auto;white-space:pre-wrap;font-family:"Courier New",monospace}
.copy-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px}
.btn-copy{background:#2255aa;color:#fff;border:none;border-radius:8px;padding:10px 16px;font-size:13px;cursor:pointer}
.btn-copy:active{background:#1a4488}
.copy-hint{font-size:11px;color:#44ff44;min-height:16px}
.footer{text-align:center;padding:12px;font-size:10px;color:#333355}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .3s ease}
</style>
</head>
<body>
<div class="header">
  <h1>☯ 周易六爻占卜 ☯</h1>
  <p>纳甲装卦 · 世应定位 · 六亲配属 · 六神临日</p>
</div>
<div class="input-row"><input type="text" id="question" placeholder="输入所问之事（例：此行是否顺利？）" maxlength="100"></div>
<div class="card coin-area">
  <div class="coins"><div class="coin" id="c0">○</div><div class="coin" id="c1">○</div><div class="coin" id="c2">○</div></div>
  <div class="coin-status" id="coinStatus">请先输入问题，再逐爻掷铜钱</div>
  <div class="coin-result" id="coinResult"></div>
</div>
<div class="btns">
  <button class="btn btn-cast" id="btnCast">掷一爻（初爻）</button>
  <button class="btn btn-cancel" id="btnCancel" disabled>重置</button>
</div>
<div class="progress" id="progress"></div>
<div class="yao-table" id="yaoTable"></div>
<div class="card result-card" id="resultCard">
  <div class="gua-name" id="guaName"></div>
  <div class="fortune" id="fortune"></div>
  <div class="wx-info" id="wxInfo"></div>
  <div class="ty-info" id="tyInfo"></div>
</div>
<div class="card analysis-card" id="analysisCard">
  <div class="analysis-title">断　卦</div>
  <div class="analysis-box" id="analysisBox"></div>
  <div class="copy-row">
    <button class="btn btn-copy" id="btnCopy">复制断卦给AI</button>
    <span class="copy-hint" id="copyHint"></span>
  </div>
</div>
<div class="footer">周易六爻占卜 · 传统文化智慧</div>
<script>
// Polyfill
if(!String.prototype.padEnd){String.prototype.padEnd=function(l,c){c=c||" ";return this.length>=l?this:this+c.repeat(l-this.length)}}
if(!String.prototype.padStart){String.prototype.padStart=function(l,c){c=c||" ";return this.length>=l?this:c.repeat(l-this.length)+this}}
// Data
var BAGUA={"乾":{"symbol":"☰","nature":"天","wuXing":"金","direction":"西北"},"坤":{"symbol":"☷","nature":"地","wuXing":"土","direction":"西南"},"震":{"symbol":"☳","nature":"雷","wuXing":"木","direction":"东"},"巽":{"symbol":"☴","nature":"风","wuXing":"木","direction":"东南"},"坎":{"symbol":"☵","nature":"水","wuXing":"水","direction":"北"},"离":{"symbol":"☲","nature":"火","wuXing":"火","direction":"南"},"艮":{"symbol":"☶","nature":"山","wuXing":"土","direction":"东北"},"兑":{"symbol":"☱","nature":"泽","wuXing":"金","direction":"西"}};
var WUXING={"金":{"generates":"水","overcomes":"木","color":"白","season":"秋","taste":"辛","organ":"肺"},"木":{"generates":"火","overcomes":"土","color":"青","season":"春","taste":"酸","organ":"肝"},"水":{"generates":"木","overcomes":"火","color":"黑","season":"冬","taste":"咸","organ":"肾"},"火":{"generates":"土","overcomes":"金","color":"红","season":"夏","taste":"苦","organ":"心"},"土":{"generates":"金","overcomes":"水","color":"黄","season":"四季","taste":"甘","organ":"脾"}};
var GUA64={"乾乾":{"name":"乾为天","number":1,"meaning":"元亨利贞","fortune":"大吉","desc":"天行健，君子以自强不息。刚健中正，事业亨通。","chuyu":"《周易·乾卦》"},"坤坤":{"name":"坤为地","number":2,"meaning":"元亨，利牝马之贞","fortune":"大吉","desc":"地势坤，君子以厚德载物。柔顺承载，厚德载物。","chuyu":"《周易·坤卦》"},"坎震":{"name":"水雷屯","number":3,"meaning":"元亨利贞，勿用有攸往","fortune":"小凶","desc":"云雷屯，君子以经纶。万事开头难，宜守正待时。","chuyu":"《周易·屯卦》"},"艮坎":{"name":"山水蒙","number":4,"meaning":"亨。匪我求童蒙，童蒙求我","fortune":"小凶","desc":"山下出泉，蒙。君子以果行育德。启蒙教育，虚心求教。","chuyu":"《周易·蒙卦》"},"坎乾":{"name":"水天需","number":5,"meaning":"有孚，光亨，贞吉","fortune":"吉","desc":"云上于天，需。君子以饮食宴乐。诚信等待，把握时机。","chuyu":"《周易·需卦》"},"乾坎":{"name":"天水讼","number":6,"meaning":"有孚窒惕，中吉","fortune":"凶","desc":"天与水违行，讼。君子以作事谋始。争讼不利，宜慎始。","chuyu":"《周易·讼卦》"},"坤坎":{"name":"地水师","number":7,"meaning":"贞，丈人吉，无咎","fortune":"吉","desc":"地中有水，师。君子以容民畜众。统帅之道，正道而行。","chuyu":"《周易·师卦》"},"坎坤":{"name":"水地比","number":8,"meaning":"吉。原筮元永贞，无咎","fortune":"吉","desc":"地上有水，比。先王以建万国，亲诸侯。亲比辅佐，和睦相处。","chuyu":"《周易·比卦》"},"巽乾":{"name":"风天小畜","number":9,"meaning":"亨。密云不雨，自我西郊","fortune":"小吉","desc":"风行天上，小畜。君子以懿文德。小有积蓄，循序渐进。","chuyu":"《周易·小畜卦》"},"乾兑":{"name":"天泽履","number":10,"meaning":"履虎尾，不咥人，亨","fortune":"吉","desc":"上天下泽，履。君子以辩上下，定民志。谨慎行事，礼待他人。","chuyu":"《周易·履卦》"},"坤乾":{"name":"地天泰","number":11,"meaning":"小往大来，吉亨","fortune":"大吉","desc":"天地交泰，后以财成天地之道。通泰安宁，万事顺遂。","chuyu":"《周易·泰卦》"},"乾坤":{"name":"天地否","number":12,"meaning":"否之匪人，不利君子贞","fortune":"大凶","desc":"天地不交，否。君子以俭德辟难。天地不交，诸事不顺。","chuyu":"《周易·否卦》"},"乾离":{"name":"天火同人","number":13,"meaning":"同人于野，亨","fortune":"吉","desc":"天与火，同人。君子以类族辨物。和睦相处，志同道合。","chuyu":"《周易·同人卦》"},"离乾":{"name":"火天大有","number":14,"meaning":"元亨","fortune":"大吉","desc":"火在天上，大有。君子以遏恶扬善，顺天休命。大有收获，事业兴旺。","chuyu":"《周易·大有卦》"},"坤艮":{"name":"地山谦","number":15,"meaning":"亨，君子有终","fortune":"大吉","desc":"地中有山，谦。君子以裒多益寡，称物平施。谦虚美德，亨通顺利。","chuyu":"《周易·谦卦》"},"震坤":{"name":"雷地豫","number":16,"meaning":"利建侯行师","fortune":"吉","desc":"雷出地奋，豫。先王以作乐崇德。欢乐安逸，宜建功立业。","chuyu":"《周易·豫卦》"},"兑震":{"name":"泽雷随","number":17,"meaning":"元亨利贞，无咎","fortune":"吉","desc":"泽中有雷，随。君子以向晦入宴息。随和顺从，与时俱进。","chuyu":"《周易·随卦》"},"艮巽":{"name":"山风蛊","number":18,"meaning":"元亨，利涉大川","fortune":"凶","desc":"山下有风，蛊。君子以振民育德。革除积弊，振作精神。","chuyu":"《周易·蛊卦》"},"坤兑":{"name":"地泽临","number":19,"meaning":"元亨利贞","fortune":"大吉","desc":"泽上有地，临。君子以教思无穷，容保民无疆。居上临下，恩威并施。","chuyu":"《周易·临卦》"},"巽坤":{"name":"风地观","number":20,"meaning":"盥而不荐，有孚颙若","fortune":"小吉","desc":"风行地上，观。先王以省方观民设教。观察瞻仰，审时度势。","chuyu":"《周易·观卦》"},"离震":{"name":"火雷噬嗑","number":21,"meaning":"亨，利用狱","fortune":"小吉","desc":"雷电噬嗑，先王以明罚敕法。决断刑狱，明辨是非。","chuyu":"《周易·噬嗑卦》"},"艮离":{"name":"山火贲","number":22,"meaning":"亨，小利有攸往","fortune":"小吉","desc":"山下有火，贲。君子以明庶政，无敢折狱。文饰光明，注重形式。","chuyu":"《周易·贲卦》"},"艮坤":{"name":"山地剥","number":23,"meaning":"不利有攸往","fortune":"凶","desc":"山附于地，剥。上以厚下安宅。剥落衰败，宜守不宜攻。","chuyu":"《周易·剥卦》"},"坤震":{"name":"地雷复","number":24,"meaning":"亨。出入无疾，朋来无咎","fortune":"吉","desc":"雷在地中，复。先王以至日闭关。回归复始，重新开始。","chuyu":"《周易·复卦》"},"乾震":{"name":"天雷无妄","number":25,"meaning":"元亨利贞","fortune":"吉","desc":"天下雷行，物与无妄。先王以茂对时育万物。无妄之行，顺应自然。","chuyu":"《周易·无妄卦》"},"艮乾":{"name":"山天大畜","number":26,"meaning":"利贞，不家食吉","fortune":"大吉","desc":"天在山中，大畜。君子以多识前言往行，以畜其德。大有积蓄，厚积薄发。","chuyu":"《周易·大畜卦》"},"艮震":{"name":"山雷颐","number":27,"meaning":"贞吉。观颐，自求口实","fortune":"吉","desc":"山下有雷，颐。君子以慎言语，节饮食。颐养之道，修身养性。","chuyu":"《周易·颐卦》"},"兑巽":{"name":"泽风大过","number":28,"meaning":"栋桡，利有攸往，亨","fortune":"凶","desc":"泽灭木，大过。君子以独立不惧，遁世无闷。栋梁弯曲，力不胜任。","chuyu":"《周易·大过卦》"},"坎坎":{"name":"坎为水","number":29,"meaning":"习坎，有孚，维心亨","fortune":"凶","desc":"水洊至，习坎。君子以常德行，习教事。重重险陷，谨慎前行。","chuyu":"《周易·坎卦》"},"离离":{"name":"离为火","number":30,"meaning":"利贞，亨。畜牝牛，吉","fortune":"吉","desc":"明两作离，大人以继明照于四方。附丽光明，依附正道。","chuyu":"《周易·离卦》"},"兑艮":{"name":"泽山咸","number":31,"meaning":"亨，利贞，取女吉","fortune":"大吉","desc":"山上有泽，咸。君子以虚受人。感应相通，以诚相待。","chuyu":"《周易·咸卦》"},"震巽":{"name":"雷风恒","number":32,"meaning":"亨，无咎，利贞","fortune":"吉","desc":"雷风恒，君子以立不易方。恒久不变，持之以恒。","chuyu":"《周易·恒卦》"},"乾艮":{"name":"天山遁","number":33,"meaning":"亨，小利贞","fortune":"小凶","desc":"天下有山，遁。君子以远小人，不恶而严。退避隐遁，明哲保身。","chuyu":"《周易·遁卦》"},"震乾":{"name":"雷天大壮","number":34,"meaning":"利贞","fortune":"吉","desc":"雷在天上，大壮。君子以非礼弗履。刚强壮盛，守正不阿。","chuyu":"《周易·大壮卦》"},"离坤":{"name":"火地晋","number":35,"meaning":"康侯用锡马蕃庶，昼日三接","fortune":"大吉","desc":"明出地上，晋。君子以自昭明德。晋升发展，前途光明。","chuyu":"《周易·晋卦》"},"坤离":{"name":"地火明夷","number":36,"meaning":"利艰贞","fortune":"凶","desc":"明入地中，明夷。君子以莅众，用晦而明。光明受损，韬光养晦。","chuyu":"《周易·明夷卦》"},"巽离":{"name":"风火家人","number":37,"meaning":"利女贞","fortune":"吉","desc":"风自火出，家人。君子以言有物而行有恒。家庭和睦，各安其位。","chuyu":"《周易·家人卦》"},"离兑":{"name":"火泽睽","number":38,"meaning":"小事吉","fortune":"小凶","desc":"上火下泽，睽。君子以同而异。乖违背离，求同存异。","chuyu":"《周易·睽卦》"},"坎艮":{"name":"水山蹇","number":39,"meaning":"利西南，不利东北","fortune":"凶","desc":"山上有水，蹇。君子以反身修德。艰难险阻，反省自身。","chuyu":"《周易·蹇卦》"},"震坎":{"name":"雷水解","number":40,"meaning":"利西南，无所往","fortune":"吉","desc":"雷雨作，解。君子以赦过宥罪。解除困难，宽以待人。","chuyu":"《周易·解卦》"},"艮兑":{"name":"山泽损","number":41,"meaning":"有孚，元吉，无咎","fortune":"小凶","desc":"山下有泽，损。君子以惩忿窒欲。减损之道，克制欲望。","chuyu":"《周易·损卦》"},"巽震":{"name":"风雷益","number":42,"meaning":"利有攸往，利涉大川","fortune":"大吉","desc":"风雷益，君子以见善则迁，有过则改。增益之道，见贤思齐。","chuyu":"《周易·益卦》"},"兑乾":{"name":"泽天夬","number":43,"meaning":"扬于王庭，孚号有厉","fortune":"小凶","desc":"泽上于天，夬。君子以施禄及下，居德则忌。决断刚健，果断行事。","chuyu":"《周易·夬卦》"},"乾巽":{"name":"天风姤","number":44,"meaning":"女壮，勿用取女","fortune":"小凶","desc":"天下有风，姤。后以施命诰四方。不期而遇，谨慎应对。","chuyu":"《周易·姤卦》"},"兑坤":{"name":"泽地萃","number":45,"meaning":"亨，王假有庙","fortune":"吉","desc":"泽上于地，萃。君子以除戎器，戒不虞。聚集汇合，团结一心。","chuyu":"《周易·萃卦》"},"坤巽":{"name":"地风升","number":46,"meaning":"元亨，用见大人","fortune":"大吉","desc":"地中生木，升。君子以顺德，积小以高大。上升进步，步步高升。","chuyu":"《周易·升卦》"},"兑坎":{"name":"泽水困","number":47,"meaning":"亨，贞，大人吉","fortune":"凶","desc":"泽无水，困。君子以致命遂志。困顿穷迫，坚守志向。","chuyu":"《周易·困卦》"},"坎巽":{"name":"水风井","number":48,"meaning":"改邑不改井，无丧无得","fortune":"吉","desc":"木上有水，井。君子以劳民劝相。井养不穷，泽被苍生。","chuyu":"《周易·井卦》"},"兑离":{"name":"泽火革","number":49,"meaning":"巳日乃孚，元亨利贞","fortune":"吉","desc":"泽中有火，革。君子以治历明时。变革更新，顺应时势。","chuyu":"《周易·革卦》"},"离巽":{"name":"火风鼎","number":50,"meaning":"元吉，亨","fortune":"大吉","desc":"木上有火，鼎。君子以正位凝命。鼎新之象，革故鼎新。","chuyu":"《周易·鼎卦》"},"震震":{"name":"震为雷","number":51,"meaning":"亨。震来虩虩，笑言哑哑","fortune":"小吉","desc":"洊雷震，君子以恐惧修省。震动惊惧，修身反省。","chuyu":"《周易·震卦》"},"艮艮":{"name":"艮为山","number":52,"meaning":"艮其背，不获其身","fortune":"小吉","desc":"兼山艮，君子以思不出其位。止而不动，安分守己。","chuyu":"《周易·艮卦》"},"巽艮":{"name":"风山渐","number":53,"meaning":"女归吉，利贞","fortune":"吉","desc":"山上有木，渐。君子以居贤德善俗。循序渐进，按部就班。","chuyu":"《周易·渐卦》"},"震兑":{"name":"雷泽归妹","number":54,"meaning":"征凶，无攸利","fortune":"凶","desc":"泽上有雷，归妹。君子以永终知敝。少女出嫁，慎重行事。","chuyu":"《周易·归妹卦》"},"震离":{"name":"雷火丰","number":55,"meaning":"亨，王假之，勿忧","fortune":"吉","desc":"雷电皆至，丰。君子以折狱致刑。丰盛盈满，明察秋毫。","chuyu":"《周易·丰卦》"},"离艮":{"name":"火山旅","number":56,"meaning":"小亨，旅贞吉","fortune":"小凶","desc":"山上有火，旅。君子以明慎用刑而不留狱。旅途羁绊，谨慎小心。","chuyu":"《周易·旅卦》"},"巽巽":{"name":"巽为风","number":57,"meaning":"小亨，利有攸往","fortune":"小吉","desc":"随风巽，君子以申命行事。顺从谦逊，申明号令。","chuyu":"《周易·巽卦》"},"兑兑":{"name":"兑为泽","number":58,"meaning":"亨，利贞","fortune":"吉","desc":"丽泽兑，君子以朋友讲习。喜悦和乐，朋友讲习。","chuyu":"《周易·兑卦》"},"巽坎":{"name":"风水涣","number":59,"meaning":"亨，王假有庙","fortune":"小凶","desc":"风行水上，涣。先王以享于帝，立庙。涣散离散，聚合人心。","chuyu":"《周易·涣卦》"},"坎兑":{"name":"水泽节","number":60,"meaning":"亨，苦节不可贞","fortune":"吉","desc":"泽上有水，节。君子以制数度，议德行。节制有度，适可而止。","chuyu":"《周易·节卦》"},"巽兑":{"name":"风泽中孚","number":61,"meaning":"豚鱼吉，利涉大川","fortune":"大吉","desc":"泽上有风，中孚。君子以议狱缓死。诚信中道，以诚感人。","chuyu":"《周易·中孚卦》"},"震艮":{"name":"雷山小过","number":62,"meaning":"亨，利贞","fortune":"小凶","desc":"山上有雷，小过。君子以行过乎恭，丧过乎哀，用过乎俭。小有过越，谨小慎微。","chuyu":"《周易·小过卦》"},"坎离":{"name":"水火既济","number":63,"meaning":"亨，小利贞","fortune":"吉","desc":"水在火上，既济。君子以思患而豫防之。功成业就，居安思危。","chuyu":"《周易·既济卦》"},"离坎":{"name":"火水未济","number":64,"meaning":"亨，小狐汔济","fortune":"小凶","desc":"火在水上，未济。君子以慎辨物居方。尚未完成，继续努力。","chuyu":"《周易·未济卦》"}};

function castYao(){
  if(busy||nextYao>=6)return;
  busy=true;
  var btn=document.getElementById("btnCast");btn.disabled=true;
  document.getElementById("btnCancel").disabled=false;
  var idx=nextYao;
  document.getElementById("coinStatus").textContent="第"+(idx+1)+"爻（"+YAO_NAMES[idx]+"爻）掷铜钱中...";
  document.getElementById("coinResult").textContent="";
  var total=[6,7,8,9][Math.floor(Math.random()*4)];
  var csVals=[],numThrees=total-6;
  for(var i=0;i<3;i++)csVals.push(i<numThrees?3:2);
  for(var i=2;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=csVals[i];csVals[i]=csVals[j];csVals[j]=tmp}
  var frames=[];
  for(var f=0;f<8;f++){frames.push([Math.random()<.5?2:3,Math.random()<.5?2:3,Math.random()<.5?2:3])}
  frames.push(csVals);
  var fi=0;
  function step(){
    if(fi>=frames.length){
      for(var ci=0;ci<3;ci++)setCoin(ci,csVals[ci]);
      var r=CN[total];
      document.getElementById("coinResult").innerHTML=r.n+(r.c?" <span style='color:#ff8844'>(变爻)</span>":"");
      document.getElementById("coinResult").style.color=r.c?"var(--dong)":"#88ff88";
      results.push(total);
      updateYao(idx,CN[total].yy,CN[total].c);
      progDots[idx].classList.add("done");
      nextYao++;busy=false;
      if(nextYao>=6){showResult();btn.textContent="占卜完成 ✓"}
      else{btn.textContent="掷一爻（"+YAO_NAMES[nextYao]+"爻）";btn.disabled=false;document.getElementById("coinStatus").textContent="第"+(nextYao+1)+"爻就绪"}
      return;
    }
    var f=frames[fi];for(var ci=0;ci<3;ci++)setCoin(ci,f[ci]);fi++;
    setTimeout(step,fi>=frames.length?200:100);
  }
  step();
}

function showResult(){
  var q=document.getElementById("question").value.trim()||"请指点迷津";
  var ys=[];
  for(var k=0;k<6;k++){var rv=CN[results[k]];ys.push({pos:k+1,cs:results[k],yy:rv.yy,nm:rv.n,ch:rv.c,gz:"",wx:"",lq:"",sh:"",is_s:false,is_y:false,ny:""})}
  var lg=bgYY([ys[0].yy,ys[1].yy,ys[2].yy]),ug=bgYY([ys[3].yy,ys[4].yy,ys[5].yy]);
  var key=ug+lg;
  var inf=GUA64[key]||{name:"未知",number:0,meaning:"",fortune:"平",desc:"",chuyu:""};
  var by=[];for(var k=0;k<6;k++)by.push(ys[k].yy);
  for(var k=0;k<6;k++)if(ys[k].ch)by[k]^=1;
  var biKey=bgYY(by.slice(3))+bgYY(by.slice(0,3));
  var bi=GUA64[biKey]||{name:"未知",number:0,meaning:"",fortune:"平",desc:"",chuyu:""};
  var ii=NA[lg]?NA[lg].i:NA["乾"].i,oo=NA[ug]?NA[ug].o:NA["乾"].o;
  for(var k=0;k<3;k++){var gz=ii[k];ys[k].gz=gz[0]+gz[1];ys[k].wx=DZ[gz[1]]}
  for(var k=0;k<3;k++){var gz=oo[k];ys[3+k].gz=gz[0]+gz[1];ys[3+k].wx=DZ[gz[1]]}
  for(var k=0;k<6;k++)ys[k].ny=NY[ys[k].gz]||"";
  var siyi=SY[key]||[2,5];ys[siyi[0]].is_s=true;ys[siyi[1]].is_y=true;
  var mw=WX[lg]||"土";for(var k=0;k<6;k++)ys[k].lq=lqCalc(mw,ys[k].wx);
  var dg=dgNow();var ix=SO.indexOf(SS[dg[0]]||"青龙");
  for(var k=0;k<6;k++)ys[k].sh=SO[(ix+k)%6];
  var cp=[];for(var k=0;k<6;k++)if(ys[k].ch)cp.push(ys[k].pos);
  var ti=WX[lg]||"土",yo=WX[ug]||"土",ty=tyRel(ti,yo);
  var g={q:q,ys:ys,lg:lg,ug:ug,inf:inf,bi:bi,cp:cp,dg:dg,ti:ti,yo:yo,ty:ty};
  currentGua=g;
  // Render
  document.getElementById("guaName").textContent=inf.name;
  var fc={"大吉":"#44ff44","吉":"#66cc66","小吉":"#cccc44","小凶":"#cc8844","凶":"#cc4444","大凶":"#ff2222"};
  var ftEl=document.getElementById("fortune");ftEl.textContent="【"+inf.fortune+"】";ftEl.style.color=fc[inf.fortune]||"var(--gold)";
  var bs=BAGUA[ug]||{},bx2=BAGUA[lg]||{};
  document.getElementById("wxInfo").textContent="上卦："+ug+(bs.symbol||"")+"（"+(WX[ug]||"")+"） 下卦："+lg+(bx2.symbol||"")+"（"+(WX[lg]||"")+"）";
  document.getElementById("tyInfo").textContent="梅花："+ty;
  document.getElementById("resultCard").className="card result-card show fade-up";
  for(var k=0;k<6;k++){
    var y=ys[k],row=yaoRows[k];
    var symEl=row.querySelector(".sym"),gzEl=row.querySelector(".gz"),lqEl=row.querySelector(".lq"),tagEl=row.querySelector(".tag");
    symEl.textContent=y.yy?(y.ch?"━━━━━━━○":"━━━━━━━"):(y.ch?"━━ ━━×":"━━ ━━");
    symEl.style.color=y.ch?"var(--dong)":(y.yy?"var(--yang)":"var(--yin)");
    gzEl.textContent=y.gz;lqEl.textContent=y.lq;
    var tg=[];if(y.is_s)tg.push("世");if(y.is_y)tg.push("应");if(y.ch)tg.push("动");
    tagEl.textContent=tg.join(" ");
  }
  document.getElementById("analysisBox").textContent=doAnalyze(g);
  document.getElementById("analysisCard").className="card analysis-card show fade-up";
  document.getElementById("coinStatus").textContent="六爻已齐，卦象已成";
}

function resetAll(){
  if(busy)return;
  results=[];nextYao=0;currentGua=null;busy=false;
  document.getElementById("coinResult").textContent="";
  document.getElementById("coinStatus").textContent="已重置，请重新掷卦";
  var btn=document.getElementById("btnCast");btn.textContent="掷一爻（初爻）";btn.disabled=false;
  document.getElementById("btnCancel").disabled=true;
  document.getElementById("resultCard").className="card result-card";
  document.getElementById("analysisCard").className="card analysis-card";
  document.getElementById("copyHint").textContent="";
  resetCoins();
  for(var i=0;i<6;i++){var r=yaoRows[i],s=r.querySelector(".sym");s.textContent="━━━━━━";s.style.color="var(--dim2)";r.querySelector(".gz").textContent="";r.querySelector(".lq").textContent="";r.querySelector(".tag").textContent="";progDots[i].classList.remove("done")}
}

function copyForAI(){
  if(!currentGua){document.getElementById("copyHint").textContent="请先完成占卜";return}
  var gt=doAnalyze(currentGua);var full=AI_PROMPT.replace("[将占卜结果粘贴于此]",gt);
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(full).then(function(){document.getElementById("copyHint").textContent="已复制！粘贴给AI即可"}).catch(function(){doFallbackCopy(full)})}
  else{doFallbackCopy(full)}
}
function doFallbackCopy(text){var ta=document.createElement("textarea");ta.value=text;ta.style.cssText="position:fixed;left:-9999px";document.body.appendChild(ta);ta.select();try{document.execCommand("copy");document.getElementById("copyHint").textContent="已复制！"}catch(e){document.getElementById("copyHint").textContent="复制失败"}document.body.removeChild(ta)}

initUI();
</script>
</body>
</html>
