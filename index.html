<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="description" content="">
  <meta name="theme-color" content="#0a0a16">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>周易占卜工具</title>
  <style>
    :root {
      --bg: #0a0a16;
      --card: #111125;
      --card2: #0e0e1e;
      --gold: #ffd700;
      --gold2: #b8960f;
      --dim: #555577;
      --dim2: #333355;
      --yang: #44aaff;
      --yin: #6688ff;
      --dong: #ffdd00;
      --green: #44ff44;
      --red: #ff4444;
      --text: #ccccdd;
      --text2: #9999bb;
      --sidebar-w: min(320px, 85vw);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
      min-height: 100vh;
      line-height: 1.6;
      padding-left: env(safe-area-inset-left, 0px);
      padding-right: env(safe-area-inset-right, 0px);
    }

    /* ---- layout ---- */
    .page {
      max-width: 600px;
      margin: 0 auto;
      padding: 48px 20px 32px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      text-align: center;
      margin-bottom: 36px;
    }
    header h1 {
      font-size: 28px;
      color: var(--gold);
      letter-spacing: 6px;
    }
    header p {
      color: var(--text2);
      font-size: 13px;
      margin-top: 6px;
    }

    /* ---- cards ---- */
    .cards {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .card {
      display: block;
      background: var(--card);
      border: 1px solid var(--dim2);
      border-radius: 14px;
      padding: 26px 24px;
      text-decoration: none;
      color: inherit;
      transition: box-shadow .25s, border-color .25s, transform .15s;
      opacity: 0;
      transform: translateY(18px);
      animation: fadeUp .5s ease forwards;
    }
    .card:nth-child(1) { animation-delay: .1s; }
    .card:nth-child(2) { animation-delay: .25s; }
    .card:nth-child(3) { animation-delay: .4s; }

    .card:hover {
      border-color: var(--gold2);
      box-shadow: 0 0 18px rgba(255,215,0,.15), 0 2px 12px rgba(0,0,0,.4);
      transform: translateY(-2px);
    }

    .card-icon {
      font-size: 36px;
      margin-bottom: 10px;
      display: block;
    }
    .card-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 6px;
    }
    .card-sub {
      font-size: 13px;
      color: var(--text2);
      letter-spacing: 1px;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ---- footer ---- */
    footer {
      text-align: center;
      color: var(--dim);
      font-size: 12px;
      padding: 28px 0 12px;
    }

    /* ---- gear button ---- */
    .gear-btn {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 100;
      background: none;
      border: 1px solid var(--dim2);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      color: var(--dim);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color .2s, border-color .2s;
    }
    .gear-btn:hover { color: var(--gold); border-color: var(--gold2); transform: translateY(-1px); box-shadow: 0 0 14px rgba(255,215,0,.2); }
    .gear-btn:active { transform: scale(.92); }
    .gear-btn.left { left: 14px; right: auto; }

    /* 鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲
       Settings Sidebar (reusable component)
       鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲 */
    .sidebar-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,.45);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .4s;
    }
    .sidebar-overlay.open { opacity: 1; pointer-events: auto; }

    .sidebar {
      position: fixed;
      top: 0;
      right: 0;
      z-index: 210;
      width: var(--sidebar-w);
      height: 100%;
      background: linear-gradient(180deg, rgba(17,17,37,.98), rgba(10,10,22,.99));
      border-left: 1px solid transparent;
      border-image: linear-gradient(180deg, rgba(255,215,0,.4), rgba(68,170,255,.2), rgba(255,215,0,.1)) 1;
      transform: translateX(100%);
      transition: transform .4s cubic-bezier(.22,1,.36,1);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: -4px 0 30px rgba(0,0,0,.5), -1px 0 0 rgba(255,215,0,.08);
    }
    .sidebar.open {
      box-shadow: -4px 0 40px rgba(0,0,0,.6), -1px 0 0 rgba(255,215,0,.15), 0 0 60px rgba(255,215,0,.03);
    }
    .sidebar.open { transform: translateX(0); }

    .sidebar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 18px 14px;
      border-bottom: 1px solid transparent;
      background: linear-gradient(var(--card2), var(--card2)) padding-box,
                  linear-gradient(90deg, rgba(255,215,0,.3), rgba(68,170,255,.15), transparent) border-box;
      border-bottom: 1px solid transparent;
      position: relative;
    }
    .sidebar-head::after {
      content: '';
      position: absolute;
      bottom: 0; left: 18px; right: 18px;
      height: 1px;
      background: linear-gradient(90deg, rgba(255,215,0,.5), rgba(68,170,255,.2), transparent);
    }
    .sidebar-head h2 {
      font-size: 17px;
      color: var(--gold);
    }
    .sidebar-close {
      background: none;
      border: none;
      color: var(--text2);
      font-size: 22px;
      cursor: pointer;
      line-height: 1;
    }
    .sidebar-close:hover { color: var(--red); }

    .sidebar-body {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .field label {
      display: block;
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 5px;
    }
    .field input {
      width: 100%;
      padding: 9px 12px;
      background: var(--bg);
      border: 1px solid var(--dim2);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }
    .field input:focus { border-color: var(--gold2); box-shadow: 0 0 0 2px rgba(255,215,0,.12), 0 0 20px rgba(255,215,0,.06); }

    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 40px; }
    .pw-toggle {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--dim);
      font-size: 16px;
      cursor: pointer;
    }
    .pw-toggle:hover { color: var(--text); }

    .sidebar-body button {
      padding: 10px 16px;
      border-radius: 8px;
      border: 1px solid var(--dim2);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    .sidebar-body button:hover { border-color: var(--gold2); color: var(--gold); box-shadow: 0 0 12px rgba(255,215,0,.15); }
    .sidebar-body button:active { transform: scale(.97); }

    .test-result {
      min-height: 48px;
      padding: 10px 12px;
      border-radius: 8px;
      background: var(--bg);
      border: 1px solid var(--dim2);
      font-size: 13px;
      color: var(--text2);
      white-space: pre-wrap;
      word-break: break-all;
    }
    .test-result.ok { color: var(--green); border-color: #2a5a2a; }
    .test-result.fail { color: var(--red); border-color: #5a2a2a; }

<script>
/* 鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲
   Settings Sidebar 鈥?reusable across pages
   Copy this <script> block to any page.
   Requires matching sidebar HTML/CSS above.
   鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲 */

// ---- open / close ----
function openSettings() {
  loadSettings();
  document.getElementById('sidebarOverlay').classList.add('open');
  document.getElementById('sidebar').classList.add('open');
}

function closeSettings() {
  document.getElementById('sidebarOverlay').classList.remove('open');
  document.getElementById('sidebar').classList.remove('open');
}

// close on Escape
document.addEventListener('keydown', function (e) {
  if (e.key === 'Escape') closeSettings();
});

// ---- localStorage helpers ----
function saveSettings() {
  localStorage.setItem('zy_api_base',  document.getElementById('cfgBase').value.trim());
  localStorage.setItem('zy_api_model', document.getElementById('cfgModel').value.trim());
  localStorage.setItem('zy_api_key',   document.getElementById('cfgKey').value.trim());
}

function loadSettings() {
  document.getElementById('cfgBase').value  = localStorage.getItem('zy_api_base')  || '';
  document.getElementById('cfgModel').value = localStorage.getItem('zy_api_model') || '';
  document.getElementById('cfgKey').value   = localStorage.getItem('zy_api_key')   || '';
}

function clearSettings() {
  localStorage.removeItem('zy_api_base');
  localStorage.removeItem('zy_api_model');
  localStorage.removeItem('zy_api_key');
  document.getElementById('cfgBase').value  = '';
  document.getElementById('cfgModel').value = '';
  document.getElementById('cfgKey').value   = '';
  var box = document.getElementById('testResult');
  box.textContent = '设置已清除';
  box.className   = 'test-result';
}

// ---- password visibility toggle ----
function toggleKeyVis() {
  var inp = document.getElementById('cfgKey');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

// ---- test API connection ----
async function testApi() {
  saveSettings();
  var base  = localStorage.getItem('zy_api_base')  || '';
  var model = localStorage.getItem('zy_api_model') || '';
  var key   = localStorage.getItem('zy_api_key')   || '';
  var box   = document.getElementById('testResult');

  if (!base || !key) {
    box.textContent = '请先填写 API 地址和密钥';
    box.className   = 'test-result fail';
    return;
  }

  box.textContent = '正在测试…';
  box.className   = 'test-result';

  try {
    var url = base.replace(/\/+$/, '') + '/chat/completions';
    var res = await fetch(url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + key
      },
      body: JSON.stringify({
        model: model || 'gpt-4o-mini',
        messages: [{ role: 'user', content: 'ping' }],
        max_tokens: 5
      })
    });

    if (res.ok) {
      var data = await res.json();
      box.textContent = '✅ 连接成功\n模型: ' + (data.model || model) + '\n状态码: ' + res.status;
      box.className   = 'test-result ok';
    } else {
      var errText = await res.text();
      box.textContent = '❌ 请求失败\n状态码: ' + res.status + '\n' + errText.slice(0, 300);
      box.className   = 'test-result fail';
    }
  } catch (err) {
    box.textContent = '❌ 连接失败\n' + (err.message || err);
    box.className   = 'test-result fail';
  }
}

function openHistory() {
  renderHistory();
  document.getElementById('historyOverlay').classList.add('open');
  document.getElementById('historyPanel').classList.add('open');
}

function closeHistory() {
  document.getElementById('historyOverlay').classList.remove('open');
  document.getElementById('historyPanel').classList.remove('open');
}

function getHistory() {
  try { return JSON.parse(localStorage.getItem('zy_history') || '[]'); }
  catch(e) { return []; }
}

function saveToHistory(entry) {
  var h = getHistory();
  h.unshift(entry);
  if (h.length > 50) h = h.slice(0, 50);
  localStorage.setItem('zy_history', JSON.stringify(h));
}

function clearHistory() {
  localStorage.removeItem('zy_history');
  renderHistory();
}

function renderHistory() {
  var h = getHistory();
  var box = document.getElementById('historyList');
  if (!h.length) {
    box.innerHTML = '<div style="text-align:center;color:var(--dim);padding:40px 0;">暂无记录</div>';
    return;
  }
  var typeLabel = { liuyao: '六爻', meihua: '梅花', qimen: '奇门' };
  var html = '<div style="text-align:right;margin-bottom:10px;"><button onclick="clearHistory()" style="background:none;border:1px solid var(--dim2);color:var(--dim);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;">清除全部</button></div>';
  for (var i = 0; i < h.length; i++) {
    var r = h[i];
    var t = new Date(r.time);
    var timeStr = (t.getMonth()+1) + '/' + t.getDate() + ' ' + t.getHours() + ':' + String(t.getMinutes()).padStart(2,'0');
    var badge = typeLabel[r.type] || r.type;
    var link = r.type + '.html';
    html += '<div style="background:var(--card2);border-radius:8px;padding:10px 12px;margin-bottom:8px;cursor:pointer;" onclick="location.href=\'' + link + '\'">';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">';
    html += '<span style="color:var(--gold);font-size:12px;font-weight:700;">' + badge + '</span>';
    html += '<span style="color:var(--dim);font-size:11px;">' + timeStr + '</span></div>';
    html += '<div style="font-size:13px;color:var(--text);">' + (r.question || '未记录') + '</div>';
    html += '<div style="font-size:12px;color:var(--text2);margin-top:2px;">' + (r.summary || '') + '</div>';
    html += '</div>';
  }
  box.innerHTML = html;
}

/* ===== 优化版粒子特效系统 ===== */
(function(){
  var canvas=document.createElement('canvas');
  canvas.id='particleCanvas';
  canvas.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1';
  document.body.prepend(canvas);
  var ctx=canvas.getContext('2d');
  var W,H;
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
  resize();window.addEventListener('resize',resize);
  
  // 萤火虫
  var fireflies=[];
  for(var i=0;i<15;i++){
    fireflies.push({x:Math.random()*2000,y:Math.random()*2000,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.3,r:Math.random()*2+1,phase:Math.random()*Math.PI*2,speed:Math.random()*.02+.01,hue:Math.random()>.5?50:200});
  }
  
  // 魔法粉尘
  var magicDust=[];
  for(var i=0;i<30;i++){
    magicDust.push({x:Math.random()*W,y:Math.random()*H,size:Math.random()*2+.5,opacity:Math.random(),phase:Math.random()*Math.PI*2,speed:.02+Math.random()*.03,hue:40+Math.random()*40});
  }
  
  // 星空闪烁
  var twinklingStars=[];
  for(var i=0;i<50;i++){
    twinklingStars.push({x:Math.random()*W,y:Math.random()*H,size:Math.random()*1.5+.5,phase:Math.random()*Math.PI*2,speed:.02+Math.random()*.04});
  }
  
  // 流星
  var shootingStars=[];
  function spawnShootingStar(){
    if(shootingStars.length>2)return;
    shootingStars.push({x:Math.random()*W*.8,y:Math.random()*H*.3,vx:4+Math.random()*5,vy:2+Math.random()*2,life:1,decay:.01+Math.random()*.015,len:50+Math.random()*70});
  }
  
  // 水波纹
  var ripples=[];
  function spawnRipple(){
    if(ripples.length>3)return;
    ripples.push({x:Math.random()*W,y:Math.random()*H,r:0,maxR:60+Math.random()*80,life:1,decay:.006+Math.random()*.008});
  }
  
  var frame=0;
  var lastTime=0;
  
  function draw(timestamp){
    if(!lastTime)lastTime=timestamp;
    var delta=timestamp-lastTime;
    if(delta<33){
      requestAnimationFrame(draw);
      return;
    }
    lastTime=timestamp;
    
    ctx.clearRect(0,0,W,H);frame++;
    
    // 绘制星空闪烁
    for(var i=0;i<twinklingStars.length;i++){
      var s=twinklingStars[i];
      s.phase+=s.speed;
      var alpha=.2+.8*Math.abs(Math.sin(s.phase));
      ctx.fillStyle='rgba(255,255,255,'+alpha+')';
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
      ctx.fill();
    }
    
    // 绘制萤火虫
    for(var i=0;i<fireflies.length;i++){
      var f=fireflies[i];
      f.x+=f.vx;f.y+=f.vy;f.phase+=f.speed;
      if(f.x<0)f.x=W;if(f.x>W)f.x=0;if(f.y<0)f.y=H;if(f.y>H)f.y=0;
      var glow=.3+.7*Math.abs(Math.sin(f.phase));
      var alpha=glow*.8;
      var grd=ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,f.r*4);
      grd.addColorStop(0,'hsla('+f.hue+',80%,70%,'+alpha+')');
      grd.addColorStop(.4,'hsla('+f.hue+',80%,50%,'+(alpha*.4)+')');
      grd.addColorStop(1,'hsla('+f.hue+',80%,50%,0)');
      ctx.fillStyle=grd;ctx.beginPath();ctx.arc(f.x,f.y,f.r*4,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='hsla('+f.hue+',90%,85%,'+alpha+')';ctx.beginPath();ctx.arc(f.x,f.y,f.r,0,Math.PI*2);ctx.fill();
    }
    
    // 绘制魔法粉尘
    if(frame%2===0){
      for(var i=0;i<magicDust.length;i++){
        var d=magicDust[i];
        d.phase+=d.speed;
        d.opacity=.2+.8*Math.abs(Math.sin(d.phase));
        d.y-=.1;
        if(d.y<-10)d.y=H+10;
        ctx.fillStyle='hsla('+d.hue+',80%,70%,'+d.opacity+')';
        ctx.beginPath();
        ctx.arc(d.x,d.y,d.size,0,Math.PI*2);
        ctx.fill();
      }
    }
    
    // 绘制流星
    if(frame%300===0)spawnShootingStar();
    for(var i=shootingStars.length-1;i>=0;i--){
      var s=shootingStars[i];
      s.x+=s.vx;s.y+=s.vy;s.life-=s.decay;
      if(s.life<=0){shootingStars.splice(i,1);continue}
      var tx=s.x-s.vx*s.len*.15,ty=s.y-s.vy*s.len*.15;
      var grd=ctx.createLinearGradient(tx,ty,s.x,s.y);
      grd.addColorStop(0,'rgba(255,255,255,0)');grd.addColorStop(1,'rgba(255,255,255,'+s.life*.8+')');
      ctx.strokeStyle=grd;ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(s.x,s.y);ctx.stroke();
      var hg=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,4);
      hg.addColorStop(0,'rgba(255,255,255,'+s.life+')');hg.addColorStop(1,'rgba(255,215,0,0)');
      ctx.fillStyle=hg;ctx.beginPath();ctx.arc(s.x,s.y,4,0,Math.PI*2);ctx.fill();
    }
    
    // 绘制水波纹
    if(frame%400===0)spawnRipple();
    for(var i=ripples.length-1;i>=0;i--){
      var rp=ripples[i];
      rp.r+=.8;rp.life-=rp.decay;
      if(rp.life<=0){ripples.splice(i,1);continue}
      ctx.strokeStyle='rgba(68,170,255,'+rp.life*.3+')';ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(rp.x,rp.y,rp.r,0,Math.PI*2);ctx.stroke();
      if(rp.r>15){ctx.strokeStyle='rgba(68,170,255,'+rp.life*.15+')';ctx.beginPath();ctx.arc(rp.x,rp.y,rp.r*.6,0,Math.PI*2);ctx.stroke()}
    }
    
    requestAnimationFrame(draw);
  }
  
  requestAnimationFrame(draw);
})();
</script>
